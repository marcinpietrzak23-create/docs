<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zważeni zawodnicy</title>
  <style>
body {
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  padding:20px;
}

h2 {
  text-align:center;
}

input {
  padding:8px;
  margin:10px 0;
  width:250px;
}

table {
  width:100%;
  border-collapse:collapse;
  background:#ffffff;
  color:#000;
  border-radius:8px;
  overflow:hidden;
}

th {
  background:#102a43;
  color:#fff;
  padding:10px;
}

td {
  padding:8px;
  border-bottom:1px solid #ddd;
}

tr:nth-child(even){
  background:#f3f4f6;
}

tr:hover{
  background:#e2e8f0;
}
#count{
  text-align:center;
  margin-bottom:10px;
  font-size:18px;
  color:#38bdf8;
}
    /* ===== RED STYLE UPGRADE ===== */

.topbar{
  background: linear-gradient(90deg,#b91c1c,#7f1d1d);
  padding:15px 20px;
  font-weight:bold;
  font-size:20px;
  border-radius:10px;
  margin-bottom:20px;
}

h2::after{
  content:"";
  display:block;
  width:120px;
  height:3px;
  background:#ef4444;
  margin:10px auto 0;
  border-radius:2px;
}

input, select{
  padding:8px;
  margin:10px 5px 10px 0;
  border-radius:6px;
  border:1px solid #334155;
  background:#0f172a;
  color:#fff;
}

input:focus, select:focus{
  outline:none;
  border:1px solid #ef4444;
  box-shadow:0 0 5px #ef4444;
}

th {
  background: linear-gradient(90deg,#1e293b,#0f172a);
  color:#fff;
  padding:10px;
  border-bottom:2px solid #ef4444;
}

tr:hover{
  background:#fee2e2;
}

#count{
  text-align:center;
  margin-bottom:10px;
  font-size:18px;
  color:#ef4444;
  font-weight:bold;
}

table{
  border:1px solid rgba(239,68,68,0.3);
}
    .back-btn{
  display:inline-block;
  margin-bottom:15px;
  padding:8px 14px;
  background:#ef4444;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.back-btn:hover{
  background:#dc2626;
  transform:translateX(-2px);
}
  </style>
</head>
<body>
<div class="topbar">
  Hardstyle Kettlebell European Championship
</div>
  <div class="back-btn" onclick="goHome()">⬅ Powrót do strony głównej</div>
<h2>📋 Zważeni zawodnicy</h2>
<p style="text-align:center;opacity:0.7;margin-top:-10px;">
  Lista zawodników po ważeniu
</p><div id="count"></div>
<input id="search" placeholder="Szukaj..." onkeyup="applyFilters()">
<select id="clubFilter" onchange="applyFilters()">
  <option value="">Wszystkie kluby</option>
</select>

<select id="categoryFilter" onchange="applyFilters()">
  <option value="">Wszystkie kategorie</option>
</select>
<table border="1">
<thead>
<tr>
<th>LP</th>
<th>Zawodnik</th>
<th>Klub</th>
<th>Kategoria</th>
<th>Waga</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

const API_BASE = "https://script.google.com/macros/s/AKfycbyWhUsE8mxQeGs2LBGN3lWTVvIrqGtvoGX61z61QPilUpOXT6vImh1gg9z1IPQ18kvmhg/exec";

let DATA = [];

async function load(){

  try{

    const res = await fetch(API_BASE + "?api=boje");
    const response = await res.json();

    let raw = [];

    if (Array.isArray(response)) raw = response;
    else if (Array.isArray(response.data)) raw = response.data;
    else {
      console.error("❌ Nieznana struktura:", response);
      return;
    }

    const map = {};

    raw.forEach(r => {

      const name = r.zawodnik;
      if(!name) return;

      const w = String(r.waga || "").trim();
      if(!w) return;

      const klub = String(r.klub || "").trim();
      if(!klub) return;

      if(!map[name]){
        map[name] = {
          zawodnik: name,
          klub: klub,
          kategoria: r.kategoria || "",
          waga: r.waga
        };
      }

    });

    // 🔥 FINALNE DANE
    DATA = Object.values(map);

    DATA.sort((a,b) =>
      a.zawodnik.localeCompare(b.zawodnik,"pl")
    );

    // 🔥 ZAWSZE odśwież filtry
    if (document.getElementById("clubFilter").options.length <= 1) {
  fillFilters();
}

    // 🔥 zastosuj aktualne filtry
    applyFilters();

  }catch(e){
    console.error("❌ Błąd API:", e);
    alert("Błąd ładowania danych");
  }
}

function render(arr){

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  arr.forEach((r,i)=>{

    tbody.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${r.zawodnik}</td>
        <td>${r.klub||""}</td>
        <td>${(r.kategoria || "").replace(/^K:/,"")}</td>
        <td>${r.waga}</td>
      </tr>
    `;

  });

  document.getElementById("count").innerText =
    `👥 Zawodnicy: ${arr.length}`;
}

function applyFilters(){

  const q = document.getElementById("search").value.toLowerCase();
  const club = document.getElementById("clubFilter").value;
  const cat = document.getElementById("categoryFilter").value;

  const filtered = DATA.filter(r => {

    const textMatch =
      (r.zawodnik || "").toLowerCase().includes(q) ||
      (r.klub || "").toLowerCase().includes(q) ||
      (r.kategoria || "").toLowerCase().includes(q);

    const clubMatch = (club === "" || r.klub === club);
    const catMatch = (cat === "" || r.kategoria === cat);

    return textMatch && clubMatch && catMatch;

  });

  render(filtered);
}
load();
setInterval(load, 5000);

function fillFilters(){

  const clubs = [...new Set(
    DATA
      .map(a => (a.klub || "").trim())
      .filter(c => c !== "")
  )].sort();

  const categories = [...new Set(
    DATA
      .map(a => (a.kategoria || "").trim())
      .filter(c => c !== "")
  )].sort();

  console.log("CLUBS:", clubs); // 🔥 DEBUG

  const clubSel = document.getElementById("clubFilter");
  const catSel = document.getElementById("categoryFilter");

  clubSel.innerHTML = '<option value="">Wszystkie kluby</option>';
  catSel.innerHTML = '<option value="">Wszystkie kategorie</option>';

  clubs.forEach(c=>{
    clubSel.innerHTML += `<option value="${c}">${c}</option>`;
  });

  categories.forEach(c=>{
  const clean = c.replace(/^K:/, "");
  catSel.innerHTML += `<option value="${c}">${clean}</option>`;
});

}
  function goHome(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
