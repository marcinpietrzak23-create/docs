<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zważeni zawodnicy</title>
  <style>
body {
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  padding:20px;
}

h2 {
  text-align:center;
}
<div id="count"></div>
input {
  padding:8px;
  margin:10px 0;
  width:250px;
}

table {
  width:100%;
  border-collapse:collapse;
  background:#ffffff;
  color:#000;
  border-radius:8px;
  overflow:hidden;
}

th {
  background:#102a43;
  color:#fff;
  padding:10px;
}

td {
  padding:8px;
  border-bottom:1px solid #ddd;
}

tr:nth-child(even){
  background:#f3f4f6;
}

tr:hover{
  background:#e2e8f0;
}
#count{
  text-align:center;
  margin-bottom:10px;
  font-size:18px;
  color:#38bdf8;
}
  </style>
</head>
<body>

<h2>📋 Zważeni zawodnicy</h2>

<input id="search" placeholder="Szukaj..." onkeyup="applyFilters()">
<select id="clubFilter" onchange="applyFilters()">
  <option value="">Wszystkie kluby</option>
</select>

<select id="categoryFilter" onchange="applyFilters()">
  <option value="">Wszystkie kategorie</option>
</select>
<table border="1">
<thead>
<tr>
<th>Zawodnik</th>
<th>Klub</th>
<th>Kategoria</th>
<th>Waga</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

const API_BASE = "https://script.google.com/macros/s/AKfycbyWhUsE8mxQeGs2LBGN3lWTVvIrqGtvoGX61z61QPilUpOXT6vImh1gg9z1IPQ18kvmhg/exec";

let DATA = [];

async function load(){

  try{

    const res = await fetch(API_BASE + "?api=boje");
    const response = await res.json();

    let raw = [];

    if (Array.isArray(response)) raw = response;
    else if (Array.isArray(response.data)) raw = response.data;
    else {
      console.error("❌ Nieznana struktura:", response);
      return;
    }

    const map = {};

    raw.forEach(r => {

      const name = r.zawodnik;
      if(!name) return;

      const w = String(r.waga || "").trim();
      if(!w) return;

      if(!map[name]){
        map[name] = {
          zawodnik: name,
          klub: r.klub || "",
          kategoria: r.kategoria || "",
          waga: r.waga
        };
      }

    });

    DATA = Object.values(map);
DATA.sort((a,b) =>
  a.zawodnik.localeCompare(b.zawodnik,"pl")
);
    const firstLoad = DATA.length === 0;

DATA = Object.values(map);

DATA.sort((a,b) =>
  a.zawodnik.localeCompare(b.zawodnik,"pl")
);

// 🔥 filtry tylko przy pierwszym ładowaniu
if(firstLoad){
  fillFilters();
}

applyFilters();

  }catch(e){
    console.error("❌ Błąd API:", e);
    alert("Błąd ładowania danych");
  }
}

function render(arr){

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  arr.forEach(r=>{

    tbody.innerHTML += `
      <tr>
        <td>${r.zawodnik}</td>
        <td>${r.klub||""}</td>
        <td>${r.kategoria||""}</td>
        <td>${r.waga}</td>
      </tr>
    `;

  });
document.getElementById("count").innerText =
  `👥 Zawodnicy: ${arr.length}`;
}

function applyFilters(){

  const q = document.getElementById("search").value.toLowerCase();
  const club = document.getElementById("clubFilter").value;
  const cat = document.getElementById("categoryFilter").value;

  const filtered = DATA.filter(r => {

    return (
      (r.zawodnik || "").toLowerCase().includes(q) &&
      (club === "" || r.klub === club) &&
      (cat === "" || r.kategoria === cat)
    );

  });

  render(filtered);
}

load();
setInterval(load, 5000);

  function fillFilters(){

  const clubs = [...new Set(DATA.map(a => a.klub))];
  const categories = [...new Set(DATA.map(a => a.kategoria))];

  const clubSel = document.getElementById("clubFilter");
  const catSel = document.getElementById("categoryFilter");

  clubSel.innerHTML = '<option value="">Wszystkie kluby</option>';
  catSel.innerHTML = '<option value="">Wszystkie kategorie</option>';

  clubs.forEach(c=>{
    if(c) clubSel.innerHTML += `<option value="${c}">${c}</option>`;
  });

  categories.forEach(c=>{
    if(c) catSel.innerHTML += `<option value="${c}">${c}</option>`;
  });

}
</script>

</body>
</html>
