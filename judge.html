<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Panel sędziego</title>
  <style>
  .loading {
    opacity: 0.7;
    pointer-events: none;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #ccc;
    border-top: 2px solid black;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-left: 6px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<h2>Panel sędziego</h2>

<label>Kategoria:</label>
<select id="category"></select>
<br><br>

<label>Konkurencja:</label>
<select id="competition"></select>
<br><br>

<input type="text" id="search" placeholder="Szukaj zawodnika...">

<br><br>

<button id="saveBtn" onclick="saveResults()">ZAPISZ</button>
<table border="1" cellpadding="5">
  <thead>
  <tr id="tableHead"></tr>
</thead>
  <tbody id="tableBody"></tbody>
</table>
<br><br>
<script>

const API = "https://script.google.com/macros/s/AKfycbyWhUsE8mxQeGs2LBGN3lWTVvIrqGtvoGX61z61QPilUpOXT6vImh1gg9z1IPQ18kvmhg/exec";
const url = new URL(window.location.href);
const TOKEN = url.searchParams.get("token");

if (!TOKEN) {
  alert("Brak dostępu");
  window.location.href = "startlist.html";
}
let competitionsMap = {};
let athletes = [];
  
let currentRequestId = 0; 

async function loadAthletes(kategoria) {

  const requestId = ++currentRequestId;

  
  document.getElementById("tableBody").innerHTML = `
    <tr>
      <td colspan="4" style="text-align:center; padding:20px;">
        ⏳ Ładowanie zawodników...
      </td>
    </tr>
  `;

  const konkurencja = document.getElementById("competition").value;

const url = API + "?api=athletes"
  + "&token=" + TOKEN
  + "&kategoria=" + encodeURIComponent(kategoria)
  + "&konkurencja=" + encodeURIComponent(konkurencja);

  const res = await fetch(url);
  const data = await res.json();

  
  if (requestId !== currentRequestId) return;

  athletes = data;


athletes.sort((a, b) =>
  a.zawodnik.localeCompare(b.zawodnik, "pl", { sensitivity: "base" })
);

renderTable();
}
async function init() {

  try {
    const res = await fetch(API + "?api=competitions&token=" + TOKEN);

    console.log("STATUS:", res.status);

    const text = await res.text();
    console.log("RAW:", text);

    competitionsMap = JSON.parse(text);

  } catch (err) {
    console.error("INIT ERROR:", err);

    document.body.innerHTML = `
      <h2 style="color:red">❌ Błąd ładowania API</h2>
      <pre>${err}</pre>
    `;

    return;
  }

  // ✅ TO DODAJ
  const select = document.getElementById("category");
// 🔥 WYPEŁNIENIE DROPDOWNA KATEGORII
select.innerHTML = "";

Object.keys(competitionsMap).forEach(k => {
  const opt = document.createElement("option");
  opt.value = k;
  opt.textContent = k.replace(/^K:/, "");
  select.appendChild(opt);
});
  // 🔥 I DOPIERO TERAZ używaj select
  updateCompetitions(select.value);

  const firstComp = document.getElementById("competition").value;
  renderHeader(firstComp);

  await loadAthletes(select.value);

  select.addEventListener("change", async () => {
    updateCompetitions(select.value);

    const firstComp = document.getElementById("competition").value;
    renderHeader(firstComp);

    await loadAthletes(select.value);
  });

  document.getElementById("competition").addEventListener("change", async () => {
    const konk = document.getElementById("competition").value;
    renderHeader(konk);

    await loadAthletes(document.getElementById("category").value);
  });

  document.getElementById("search").addEventListener("input", renderTable);
}


function renderTable() {

  const search = document.getElementById("search").value.toLowerCase();
  const body = document.getElementById("tableBody");
  const konk = document.getElementById("competition").value;
const key = document.getElementById("category").value
  .toLowerCase()
  .normalize("NFD")
  .replace(/[\u0300-\u036f]/g, "");

const isSpecial =
  key.includes("masters") ||
  key.includes("zabkowiczanin") ||
  key.includes("zabkowiczanka");

// 🚫 blokada wszystkiego poza TIEBREAK
if (isSpecial && !isTiebreak(konk)) {
  body.innerHTML = `
    <tr>
      <td colspan="4" style="text-align:center; padding:20px;">
        ⚠️ W tej kategorii dostępny jest tylko TIEBREAK
      </td>
    </tr>
  `;
  return;
}
  body.innerHTML = "";

  athletes
    .filter(a => a.zawodnik.toLowerCase().includes(search))
    .forEach(a => {

      const tr = document.createElement("tr");
      const brakWagi = !a.waga;
      tr.dataset.waga = a.waga || "";

      if (isTiebreak(konk)) {

        tr.innerHTML = `
          <td>${a.zawodnik}</td>
          <td><input type="number" value="${a.p1 ?? ""}"></td>
        `;

      } else if (isSnatch(konk)) {

        tr.innerHTML = `
          <td>${a.zawodnik}</td>
         <td><input type="number" class="kg" value="${a.p1 ?? ""}"></td>
<td><input type="number" class="reps" value="${a.p2 ?? ""}"></td>
<td class="sum">${(a.p1 !== "" && a.p2 !== "") ? a.p1 * a.p2 : ""}</td>
        `;

      } else {

        tr.innerHTML = `
          <td>${a.zawodnik}</td>
          <td><input type="number" value="${a.p1 ?? ""}"></td>
<td><input type="number" value="${a.p2 ?? ""}"></td>
<td><input type="number" value="${a.p3 ?? ""}"></td>
        `;
      }

      
      if (brakWagi) {
        tr.style.opacity = "0.4";
        tr.title = "Brak wagi - nie można wpisać wyniku";

        tr.querySelectorAll("input").forEach(inp => {
          inp.disabled = true;
        });
      }

      body.appendChild(tr);
    });

  
  if (isSnatch(konk)) {
    document.querySelectorAll("#tableBody tr").forEach(row => {
      const kg = row.querySelector(".kg");
      const reps = row.querySelector(".reps");
      const sum = row.querySelector(".sum");

      if (kg && reps && sum) {
        function update() {
          const val = (kg.value && reps.value) ? kg.value * reps.value : "";
          sum.textContent = val;
        }

        kg.addEventListener("input", update);
        reps.addEventListener("input", update);
      }
    });
  }
}

document.addEventListener("DOMContentLoaded", init);
function updateCompetitions(kategoria) {

  const select = document.getElementById("competition");

  const key = kategoria
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");

  const isSpecial =
    key.includes("masters") ||
    key.includes("zabkowiczanin") ||
    key.includes("zabkowiczanka");

  select.innerHTML = "";

  // 🔥 jeśli specjalna → tylko TIEBREAK
  if (isSpecial) {
    const opt = document.createElement("option");
    opt.value = "TIEBREAK";
    opt.textContent = "TIEBREAK";
    select.appendChild(opt);
    return;
  }

  // 🔥 normalne kategorie
  const comps = competitionsMap[kategoria] || [];

  comps.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    select.appendChild(opt);
  });
}
  function isSnatch(k) {
  return k.toUpperCase().includes("SN");
}

function isTiebreak(k) {
  return k.toUpperCase().includes("TIEBREAK");
}
  function renderHeader(konk) {

  const head = document.getElementById("tableHead");
const key = document.getElementById("category").value
  .toLowerCase()
  .normalize("NFD")
  .replace(/[\u0300-\u036f]/g, "");

const isSpecial =
  key.includes("masters") ||
  key.includes("zabkowiczanin") ||
  key.includes("zabkowiczanka");

// 🚫 blokada headera dla innych bojów
if (isSpecial && !isTiebreak(konk)) {
  head.innerHTML = "";
  return;
}
  if (isTiebreak(konk)) {
    head.innerHTML = `
      <th>Zawodnik</th>
      <th>Punkty</th>
    `;
  }
  else if (isSnatch(konk)) {
    head.innerHTML = `
      <th>Zawodnik</th>
      <th>Odciążar</th>
      <th>Powtórzenia</th>
      <th>Suma</th>
    `;
  }
  else {
    head.innerHTML = `
      <th>Zawodnik</th>
      <th>P1</th>
      <th>P2</th>
      <th>P3</th>
    `;
  }
}


  function collectResults() {

  const konk = document.getElementById("competition").value;
  const rows = [];

  document.querySelectorAll("#tableBody tr").forEach(tr => {
  
    const waga = tr.dataset.waga;

if (!waga) {
  return; 
}
    const zawodnik = tr.children[0].textContent;

    const inputs = tr.querySelectorAll("input");

    if (isTiebreak(konk)) {

      const p1 = inputs[0].value;
      if (p1 !== "") {
        rows.push({ zawodnik, p1 });
      }

    } else if (isSnatch(konk)) {

      const kg = inputs[0].value;
      const reps = inputs[1].value;

      if (kg !== "" && reps !== "") {
        rows.push({ zawodnik, p1: kg, p2: reps });
      }

    } else {

      const p1 = inputs[0].value;
      const p2 = inputs[1].value;
      const p3 = inputs[2].value;

      if (p1 !== "" || p2 !== "" || p3 !== "") {
        rows.push({ zawodnik, p1, p2, p3 });
      }
    }

  });

  return rows;
}
 async function saveResults() {

  const btn = document.getElementById("saveBtn");
  btn.classList.add("loading");
  btn.innerHTML = "Zapisywanie <span class='spinner'></span>";

  const kategoria = document.getElementById("category").value;
  const konkurencja = document.getElementById("competition").value;

  const rows = collectResults();

   
  if (rows.length === 0) {
    alert("Brak danych do zapisania");
    btn.classList.remove("loading");
    btn.innerHTML = "ZAPISZ";
    return;
  }

 const payload = {
  kategoria,
  konkurencja,
  rows: rows.map(r => ({
    zawodnik: r.zawodnik,
    p1: r.p1,
    p2: r.p2,
    p3: r.p3
  }))
};


const checkRes = await fetch(API, {
  method: "POST",
  body: JSON.stringify({
    api: "checkOverwrite",
    token: TOKEN,
    kategoria: payload.kategoria,
    konkurencja: payload.konkurencja,
    rows: payload.rows
  })
});

  const check = await checkRes.json();

  let rowsToSave = rows;

if (check.overwrite) {

  const lista = check.conflicts.join("\n");

  const confirmOverwrite = confirm(
    "Nadpiszesz wyniki dla:\n\n" + lista + "\n\nKontynuować?"
  );

  if (!confirmOverwrite) {
    resetBtn();
    return;
  }
}

  try {

  // ✅ WALIDACJA (wszystkich naraz)
  for (const r of rowsToSave) {
    if (!r.zawodnik || r.zawodnik.trim() === "") {
      alert("❌ Brak nazwiska zawodnika!");
      console.error("BAD ROW:", r);
      resetBtn();
      return;
    }
  }

  // ✅ JEDEN PAYLOAD Z WSZYSTKIMI
  const payload = {
    api: "saveResults",
    token: TOKEN,
    force: 1,
    kategoria,
    konkurencja,
    rows: rowsToSave
  };

  console.log(
    "🚀 WYSYŁAM CAŁOŚĆ:",
    rowsToSave.length,
    "zawodników | SIZE:",
    JSON.stringify(payload).length
  );

  // ✅ JEDEN REQUEST
  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  const json = await res.json();

  if (!json.ok) {
    console.error("SERVER ERROR:", json);
    alert("❌ Błąd zapisu");
    resetBtn();
    return;
  }

} catch (err) {

  console.error("❌ FETCH ERROR:", err);

  alert("❌ Błąd zapisu (sieć)");

  resetBtn();
  return;
}

// ✅ końcówka (zostaje bez zmian)
const brakWagi = athletes.some(a => !a.waga);

if (brakWagi) {
  alert("Zapisano! Część zawodników bez wagi została pominięta");
} else {
  alert("Zapisano!");
}

btn.classList.remove("loading");
btn.innerHTML = "ZAPISZ";
 }
  function resetBtn() {
  const btn = document.getElementById("saveBtn");
  btn.classList.remove("loading");
  btn.innerHTML = "ZAPISZ";
}
</script>

</body>
</html>
