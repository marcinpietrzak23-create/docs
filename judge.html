<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Panel sędziego</title>
  <style>
  .loading {
    opacity: 0.7;
    pointer-events: none;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #ccc;
    border-top: 2px solid black;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-left: 6px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<h2>Panel sędziego</h2>

<label>Kategoria:</label>
<select id="category"></select>
<br><br>

<label>Konkurencja:</label>
<select id="competition"></select>
<br><br>

<input type="text" id="search" placeholder="Szukaj zawodnika...">

<br><br>

<button id="saveBtn" onclick="saveResults()">ZAPISZ</button>
  <button onclick="runValidation()" style="
  margin-left:10px;
  background:#ffa000;
  color:black;
">
  🧠 Weryfikuj wyniki
</button>
<table border="1" cellpadding="5">
  <thead>
  <tr id="tableHead"></tr>
</thead>
  <tbody id="tableBody"></tbody>
</table>
<br><br>
<script>

const API = "https://script.google.com/macros/s/AKfycbyWhUsE8mxQeGs2LBGN3lWTVvIrqGtvoGX61z61QPilUpOXT6vImh1gg9z1IPQ18kvmhg/exec";
const url = new URL(window.location.href);
const TOKEN = url.searchParams.get("token");

if (!TOKEN) {
  alert("Brak dostępu");
  window.location.href = "startlist.html";
}
let competitionsMap = {};
let athletes = [];
  
let currentRequestId = 0; 

async function loadAthletes(kategoria) {

  const requestId = ++currentRequestId;

  
  document.getElementById("tableBody").innerHTML = `
    <tr>
      <td colspan="4" style="text-align:center; padding:20px;">
        ⏳ Ładowanie zawodników...
      </td>
    </tr>
  `;

  const konkurencja = document.getElementById("competition").value;

const url = API + "?api=athletes"
  + "&token=" + TOKEN
  + "&kategoria=" + encodeURIComponent(kategoria)
  + "&konkurencja=" + encodeURIComponent(konkurencja);

  const res = await fetch(url);
  const data = await res.json();

  
  if (requestId !== currentRequestId) return;

  athletes = data;


athletes.sort((a, b) =>
  a.zawodnik.localeCompare(b.zawodnik, "pl", { sensitivity: "base" })
);

renderTable();
}
async function init() {

  try {
    const res = await fetch(API + "?api=competitions&token=" + TOKEN);

    console.log("STATUS:", res.status);

    const text = await res.text();
    console.log("RAW:", text);

    competitionsMap = JSON.parse(text);

  } catch (err) {
    console.error("INIT ERROR:", err);

    document.body.innerHTML = `
      <h2 style="color:red">❌ Błąd ładowania API</h2>
      <pre>${err}</pre>
    `;

    return;
  }

  
  const select = document.getElementById("category");

select.innerHTML = "";

Object.keys(competitionsMap).forEach(k => {
  const opt = document.createElement("option");
  opt.value = k;
  opt.textContent = k.replace(/^K:/, "");
  select.appendChild(opt);
});
  
  updateCompetitions(select.value);

  const firstComp = document.getElementById("competition").value;
renderHeader(firstComp);

await loadAthletes(select.value);
await loadResultsRaw();   

  select.addEventListener("change", async () => {
    updateCompetitions(select.value);

    const firstComp = document.getElementById("competition").value;
    renderHeader(firstComp);

    await loadAthletes(select.value);
  });

  document.getElementById("competition").addEventListener("change", async () => {
    const konk = document.getElementById("competition").value;
    renderHeader(konk);

    await loadAthletes(document.getElementById("category").value);
  });

  document.getElementById("search").addEventListener("input", renderTable);
}


function renderTable() {

  const search = document.getElementById("search").value.toLowerCase();
  const body = document.getElementById("tableBody");
  const konk = document.getElementById("competition").value;
const key = document.getElementById("category").value
  .toLowerCase()
  .normalize("NFD")
  .replace(/[\u0300-\u036f]/g, "");

const isSpecial =
  key.includes("masters") ||
  key.includes("zabkowiczanin") ||
  key.includes("zabkowiczanka");


if (isSpecial && !isTiebreak(konk)) {
  body.innerHTML = `
    <tr>
      <td colspan="4" style="text-align:center; padding:20px;">
        ⚠️ W tej kategorii dostępny jest tylko TIEBREAK
      </td>
    </tr>
  `;
  return;
}
  body.innerHTML = "";

  athletes
    .filter(a => a.zawodnik.toLowerCase().includes(search))
    .forEach(a => {

      const tr = document.createElement("tr");
      const brakWagi = !a.waga;
      tr.dataset.waga = a.waga || "";

      if (isTiebreak(konk)) {

        tr.innerHTML = `
          <td>${a.zawodnik}</td>
          <td><input type="number" value="${a.p1 ?? ""}"></td>
        `;

      } else if (isSnatch(konk)) {

        tr.innerHTML = `
          <td>${a.zawodnik}</td>
         <td><input type="number" class="kg" value="${a.p1 ?? ""}"></td>
<td><input type="number" class="reps" value="${a.p2 ?? ""}"></td>
<td class="sum">${(a.p1 !== "" && a.p2 !== "") ? a.p1 * a.p2 : ""}</td>
        `;

      } else {

        tr.innerHTML = `
          <td>${a.zawodnik}</td>
          <td><input type="number" value="${a.p1 ?? ""}"></td>
<td><input type="number" value="${a.p2 ?? ""}"></td>
<td><input type="number" value="${a.p3 ?? ""}"></td>
        `;
      }

      
      if (brakWagi) {
        tr.style.opacity = "0.4";
        tr.title = "Brak wagi - nie można wpisać wyniku";

        tr.querySelectorAll("input").forEach(inp => {
          inp.disabled = true;
        });
      }

      body.appendChild(tr);
    });

  
  if (isSnatch(konk)) {
    document.querySelectorAll("#tableBody tr").forEach(row => {
      const kg = row.querySelector(".kg");
      const reps = row.querySelector(".reps");
      const sum = row.querySelector(".sum");

      if (kg && reps && sum) {
        function update() {
          const val = (kg.value && reps.value) ? kg.value * reps.value : "";
          sum.textContent = val;
        }

        kg.addEventListener("input", update);
        reps.addEventListener("input", update);
      }
    });
  }
}

document.addEventListener("DOMContentLoaded", init);
function updateCompetitions(kategoria) {

  const select = document.getElementById("competition");

  const key = kategoria
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");

  const isSpecial =
    key.includes("masters") ||
    key.includes("zabkowiczanin") ||
    key.includes("zabkowiczanka");

  select.innerHTML = "";

 
  if (isSpecial) {
    const opt = document.createElement("option");
    opt.value = "TIEBREAK";
    opt.textContent = "TIEBREAK";
    select.appendChild(opt);
    return;
  }

 
  const comps = competitionsMap[kategoria] || [];

  comps.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    select.appendChild(opt);
  });
}
  function isSnatch(k) {
  return k.toUpperCase().includes("SN");
}

function isTiebreak(k) {
  return k.toUpperCase().includes("TIEBREAK");
}
  function renderHeader(konk) {

  const head = document.getElementById("tableHead");
const key = document.getElementById("category").value
  .toLowerCase()
  .normalize("NFD")
  .replace(/[\u0300-\u036f]/g, "");

const isSpecial =
  key.includes("masters") ||
  key.includes("zabkowiczanin") ||
  key.includes("zabkowiczanka");

// 🚫 blokada headera dla innych bojów
if (isSpecial && !isTiebreak(konk)) {
  head.innerHTML = "";
  return;
}
  if (isTiebreak(konk)) {
    head.innerHTML = `
      <th>Zawodnik</th>
      <th>Punkty</th>
    `;
  }
  else if (isSnatch(konk)) {
    head.innerHTML = `
      <th>Zawodnik</th>
      <th>Odciążar</th>
      <th>Powtórzenia</th>
      <th>Suma</th>
    `;
  }
  else {
    head.innerHTML = `
      <th>Zawodnik</th>
      <th>P1</th>
      <th>P2</th>
      <th>P3</th>
    `;
  }
}


  function collectResults() {

  const konk = document.getElementById("competition").value;
  const rows = [];

  document.querySelectorAll("#tableBody tr").forEach(tr => {
  
    const waga = tr.dataset.waga;

if (!waga) {
  return; 
}
    const zawodnik = tr.children[0].textContent;

    const inputs = tr.querySelectorAll("input");

    if (isTiebreak(konk)) {

      const p1 = inputs[0].value;
      if (p1 !== "") {
        rows.push({ zawodnik, p1 });
      }

    } else if (isSnatch(konk)) {

      const kg = inputs[0].value;
      const reps = inputs[1].value;

      if (kg !== "" && reps !== "") {
        rows.push({ zawodnik, p1: kg, p2: reps });
      }

    } else {

      const p1 = inputs[0].value;
      const p2 = inputs[1].value;
      const p3 = inputs[2].value;

      if (p1 !== "" || p2 !== "" || p3 !== "") {
        rows.push({ zawodnik, p1, p2, p3 });
      }
    }

  });

  return rows;
}
 async function saveResults() {

  const btn = document.getElementById("saveBtn");
  btn.classList.add("loading");
  btn.innerHTML = "Zapisywanie <span class='spinner'></span>";

  const kategoria = document.getElementById("category").value;
  const konkurencja = document.getElementById("competition").value;

  const rows = collectResults();

  if (rows.length === 0) {
    alert("Brak danych do zapisania");
    resetBtn();
    return;
  }

 

  try {

    // 🔥 WALIDACJA
    for (const r of rows) {
      if (!r.zawodnik || r.zawodnik.trim() === "") {
        alert("❌ Brak nazwiska zawodnika!");
        console.error("BAD ROW:", r);
        resetBtn();
        return;
      }
    }

    // 🚀 CHUNK SAVE (KLUCZ FIXA)
   

   const CHUNK_SIZE = 10;
let overwriteAccepted = false;
for (let i = 0; i < rows.length; i += CHUNK_SIZE) {

  const chunk = rows.slice(i, i + CHUNK_SIZE);

  console.log(
    `🚀 PACZKA ${Math.floor(i/CHUNK_SIZE)+1}:`,
    chunk.length
  );

  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      api: "saveResults",
      token: TOKEN,
      kategoria,
      konkurencja,
      rows: chunk
    })
  });

  const json = await res.json();

// 🔥 NOWE — backend wykrył overwrite
if (json.overwrite) {

  if (!overwriteAccepted) {

    const confirmOverwrite = confirm("Istnieją już wyniki. Nadpisać?");

    if (!confirmOverwrite) {
      resetBtn();
      return;
    }

    overwriteAccepted = true;
  }

  const res2 = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      api: "saveResults",
      token: TOKEN,
      force: 1,
      kategoria,
      konkurencja,
      rows: chunk
    })
  });

  const json2 = await res2.json();

  if (!json2.ok) {
    alert("Błąd nadpisywania");
    resetBtn();
    return;
  }

  continue;
}

  // 🔴 JEŚLI PACZKA PADNIE → debug 1 po 1
  if (!json.ok) {

    console.warn("⚠️ PACZKA PADŁA — szukam winnego...");

    for (const single of chunk) {

      console.log("➡️ TEST:", single);

      const testRes = await fetch(API, {
        method: "POST",
        body: JSON.stringify({
          api: "saveResults",
          token: TOKEN,
          force: 1,
          kategoria,
          konkurencja,
          rows: [single]
        })
      });

      const testJson = await testRes.json();

      if (!testJson.ok) {
        console.error("💀 WYKRZACZA:", single);

        alert(
          "Błąd zapisu zawodnika:\n\n" +
          single.zawodnik +
          "\n\nSprawdź dane (puste / złe wartości)"
        );

        resetBtn();
        return;
      }
    }

    // jeśli pojedynczo przeszło → dziwny błąd GAS
    alert("Błąd paczki, ale pojedyncze zapisy OK — spróbuj ponownie");
    resetBtn();
    return;
  }
}

  } catch (err) {

    console.error("❌ FETCH ERROR:", err);
    alert("❌ Błąd zapisu (sieć)");
    resetBtn();
    return;
  }

  // 🔔 INFO O WADZE
  const brakWagi = athletes.some(a => !a.waga);

  if (brakWagi) {
    alert("Zapisano! Część zawodników bez wagi została pominięta");
  } else {
    alert("Zapisano!");
  }

  await loadResultsRaw();

  resetBtn();
}
  function resetBtn() {
  const btn = document.getElementById("saveBtn");
  btn.classList.remove("loading");
  btn.innerHTML = "ZAPISZ";
}
  async function loadResultsRaw(){

  try{

    const res = await fetch(API + "?api=boje&token=" + TOKEN);
    const data = await res.json();

    // różne możliwe struktury
    if(Array.isArray(data)){
      window.RESULTS_RAW = data;
    }
    else if(Array.isArray(data.data)){
      window.RESULTS_RAW = data.data;
    }
    else if(Array.isArray(data.results)){
      window.RESULTS_RAW = data.results;
    }
    else{
      console.error("❌ NIEZNANA STRUKTURA boje:", data);
      window.RESULTS_RAW = [];
    }

  }catch(err){
    console.error("❌ Błąd ładowania boje:", err);
    window.RESULTS_RAW = [];
  }

}
  function runValidation(){

  const results = window.RESULTS_RAW || [];
if(!results.length){
  alert("Brak danych do weryfikacji");
  return;
}
  let errors = [];
  let warnings = [];
  let ok = 0;

  const map = {};

  results.forEach(r => {

    const key = r.zawodnik + "|" + r.konkurencja;

    if(!map[key]){
      map[key] = {
        name: r.zawodnik,
        comp: r.konkurencja,
        category: (r.kategoria || r.kategoria_dodatkowa || "").replace(/^k:/i,""),
        attempts: [],
        waga: r.waga
      };
    }

    map[key].attempts.push(r.wynik);

  });

  Object.values(map).forEach(a => {

    const attempts = a.attempts;

    const valid = attempts.filter(v =>
      v !== "" && v !== null && v !== undefined && !isNaN(Number(v))
    );

    // ❌ brak wyniku (puste, nie zero)
    if(valid.length === 0){
      errors.push(`❌ ${a.name} (${a.category} | ${a.comp})\n   brak wyniku`);
      return;
    }

    // ❌ brak wagi
    if(!a.waga || Number(a.waga) <= 0){
      errors.push(`❌ ${a.name} (${a.category})\n   brak wagi`);
    }

    // ⚠️ wszystkie próby = 0
    const numeric = valid.map(Number);
    if(numeric.length >= 3 && numeric.every(v => v === 0)){
      warnings.push(`⚠️ ${a.name} (${a.category} | ${a.comp})\n   wszystkie próby = 0`);
    }

    ok++;

  });

  // ===== ODSTAJĄCE =====
  const byComp = {};

  results.forEach(r=>{
    if(!byComp[r.konkurencja]) byComp[r.konkurencja] = [];
    byComp[r.konkurencja].push(Number(r.wynik));
  });

  Object.keys(byComp).forEach(comp => {

    const vals = byComp[comp].filter(v => v > 0);
    if(vals.length === 0) return;

const avg = vals.reduce((a,b)=>a+b,0)/vals.length;

    results.forEach(r=>{
      const v = Number(r.wynik);

      if(v > avg * 1.8){
        const cat = (r.kategoria || r.kategoria_dodatkowa || "").replace(/^k:/i,"");
        warnings.push(`⚠️ ${r.zawodnik} (${cat} | ${comp})\n   odstający wynik (${v})`);
      }
    });

  });

  // ===== RAPORT =====
  let report = "";

  report += `❌ BŁĘDY (${errors.length})\n\n`;
  report += errors.length ? errors.join("\n\n") : "brak";

  report += "\n\n=====================\n\n";

  report += `⚠️ OSTRZEŻENIA (${warnings.length})\n\n`;
  report += warnings.length ? warnings.join("\n\n") : "brak";

  report += "\n\n=====================\n\n";

  report += `✅ OK: ${ok}`;

  document.getElementById("validationContent").innerText = report;
  document.getElementById("validationModal").style.display = "block";
}
  function closeValidation(){
  document.getElementById("validationModal").style.display = "none";
}
</script>
<div id="validationModal" style="
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  z-index:9999;
  overflow:auto;
">
  <div style="
    background:#0f2a38;
    color:white;
    max-width:900px;
    margin:40px auto;
    padding:20px;
    border-radius:10px;
  ">
    <h2>🧠 Raport weryfikacji</h2>

    <div id="validationContent" style="
      white-space:pre-line;
      font-family:monospace;
      margin-top:20px;
    "></div>

    <button onclick="closeValidation()" style="
      margin-top:20px;
      padding:10px 20px;
      background:#d32f2f;
      border:none;
      color:white;
      border-radius:6px;
      cursor:pointer;
    ">
      Zamknij
    </button>
  </div>
</div>
</body>
</html>
