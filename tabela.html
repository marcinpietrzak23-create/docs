<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Klasyfikacja</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<style>
#loader {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 40vh;
  font-size: 18px;
  color: #666;
}
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #ddd;
  border-top: 4px solid #c00;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-right: 12px;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.generalka-hidden {
  margin: 30px 0;
  padding: 18px 20px;
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  color: #f1f5f9;
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-title">
      Hardstyle Kettlebell European Championship
    </div>
    <div class="header-links">
      <a id="liveLink" href="#" target="_blank" style="display:none">🔴 LIVE</a>
      <a href="kontakt.html">Kontakt</a>
    </div>
  </div>
</header>

<div class="page table-page">
  <div class="table-panel">

    <a href="#" class="back-link" id="backBtn">← Powrót</a>
    <h1 id="categoryTitle"></h1>

    <input id="filterInput" placeholder="Filtruj po zawodniku lub klubie…" />

    <div id="loader">
      <div class="spinner"></div>
      <div>Ładowanie wyników…</div>
    </div>

    <div id="content" style="display:none">

      <h2>🏆 Klasyfikacja generalna</h2>

      <div id="generalkaInfo" class="generalka-hidden" style="display:none">
        Klasyfikacja generalna zostanie opublikowana po zakończeniu ceremonii dekoracji.
      </div>

      <table id="generalka">
        <thead><tr></tr></thead>
        <tbody></tbody>
      </table>

      <div id="boje"></div>

    </div>
  </div>
</div>

<script>
/* ================= CONFIG ================= */
const API_URL = "https://script.google.com/macros/s/AKfycbyWhUsE8mxQeGs2LBGN3lWTVvIrqGtvoGX61z61QPilUpOXT6vImh1gg9z1IPQ18kvmhg/exec";
const params = new URLSearchParams(location.search);
const CATEGORY_KEY = decodeURIComponent(params.get("arkusz") || "");

/* ================= HELPERS ================= */
function norm(s){
  return String(s||"")
    .replace(/\u00A0/g," ")
    .trim()
    .replace(/\s+/g," ")
    .toLowerCase();
}
function cleanComp(c){
  return String(c || "")
    .replace(/'/g, "")
    .trim()
    .toUpperCase();
}
/* ================= GLOBAL STATE ================= */
let COMP_ORDER = [];
let CATEGORY_LABEL = "Wyniki: " + CATEGORY_KEY;
let SHOW_GENERALKA = true;

/* ================= LOAD ALL ================= */
async function loadAll(){

  /* ---- SETTINGS FIRST ---- */
  const settingsRes = await fetch(`${API_URL}?settings=1`).then(r=>r.json());
  const s = settingsRes?.settings || {};

  SHOW_GENERALKA = String(s.show_generalka ?? "1") === "1";

  if(s[CATEGORY_KEY]){
    CATEGORY_LABEL = "Wyniki: " + s[CATEGORY_KEY];
  }
  document.getElementById("categoryTitle").textContent = CATEGORY_LABEL;
const compMap = {};

window.COMP_MAP = {};
COMP_ORDER = [];

Object.keys(s)
  .filter(k=>/^competition_\d+$/.test(k))
  .map(k=>({
    idx: parseInt(k.replace("competition_",""),10),
    key: s[k]
  }))
  .sort((a,b)=>a.idx-b.idx)
  .forEach(o=>{

    COMP_ORDER.push(o.key);

    window.COMP_MAP[o.key] = {
      key: o.key,
      short: s[`competition_${o.idx}_short`] || o.key,
      full: s[`competition_${o.idx}_full`] || o.key
    };

  });
 

  const btn=document.getElementById("liveLink");
  if(s.live_url){
    btn.href=s.live_url;
    btn.textContent=s.live_text||"🔴 LIVE";
    btn.style.display="inline-block";
  }

  /* ---- CACHE ---- */
  let cacheView=null, cacheExtra=null, cacheBoje=null;
  try{
    cacheView=JSON.parse(localStorage.getItem("api_view"));
    cacheExtra=JSON.parse(localStorage.getItem("api_extra"));
    cacheBoje=JSON.parse(localStorage.getItem("api_boje"));
  }catch{}

  if(cacheView && cacheExtra && cacheBoje){
    renderAll(cacheView, cacheExtra, cacheBoje);
  }

  /* ---- FETCH API ---- */
  const [view,extra,boje] = await Promise.all([
    fetch(`${API_URL}?arkusz=API_VIEW`).then(r=>r.json()).catch(()=>({data:[]})),
    fetch(`${API_URL}?arkusz=API_DODATKOWE`).then(r=>r.json()).catch(()=>({data:[]})),
    fetch(`${API_URL}?api=boje`).then(r=>r.json()).catch(()=>[])
  ]);

  localStorage.setItem("api_view",JSON.stringify(view));
  localStorage.setItem("api_extra",JSON.stringify(extra));
  localStorage.setItem("api_boje",JSON.stringify(boje));

  renderAll(view,extra,boje);

  document.getElementById("loader").style.display="none";
  document.getElementById("content").style.display="block";
}
function fmt(n){
  const num = Number(n);
  return Number.isInteger(num) ? num : num.toFixed(1);
}
/* ================= RENDER ================= */
function renderAll(baseRes, extraRes, bojeRows){
  const baseRows=(baseRes.data||[])
    .filter(r =>
      norm(r.KATEGORIA_PODSTAWOWA)===norm(CATEGORY_KEY) ||
      norm(r.KATEGORIA)===norm(CATEGORY_KEY)
    );

  const extraRows=(extraRes.data||[])
  .filter(r => {
    const key = norm(CATEGORY_KEY);

    return String(r.KATEGORIA_DODATKOWA || "")
      .split(",")
      .map(s => norm(s))
      .some(c => {
        console.log("COMPARE:", c, "vs", key);
        return c === key;
      });
  });

console.log("FINAL EXTRA ROWS:", extraRows.length);

  buildGeneralka([...baseRows,...extraRows], bojeRows);
  console.log("COMP_ORDER:", COMP_ORDER);
console.log("COMP_MAP:", window.COMP_MAP);
COMP_ORDER.forEach(c=>{
  console.log("KEY:", c, "MAP:", window.COMP_MAP[c]);
});

  
const punktyMap = {};

[...baseRows, ...extraRows].forEach(r=>{
  const key = norm(r.ZAWODNIK)+"|"+norm(r.KONKURENCJA);

  punktyMap[key] = {
    pkt: r.PKT,
    wynik: r["%MC"]
  };
});
  
  const key = norm(CATEGORY_KEY);

// 👇 lista bojów dla Masters
const mastersComps = ["SNUB3'","2KBSQ1RM","TGU1RM"];

const filteredBoje = (bojeRows || [])
  .filter(r => {

    const kat = norm(r.kategoria);
    const katDod = norm(r.kategoria_dodatkowa);
    const comp = r.konkurencja;

    const matchCategory =
      kat.includes(key) ||
      katDod.includes(key);

    // 👉 dodatkowy filtr tylko dla Masters
    if (key.includes("masters")) {
      return matchCategory && mastersComps.includes(comp);
    }

    return matchCategory;
  });
console.log("CATEGORY_KEY:", CATEGORY_KEY);

(bojeRows || []).slice(0,20).forEach(r => {
  console.log("ROW:", {
    kat: r.kategoria,
    kat_dod: r.kategoria_dodatkowa,
    konk: r.konkurencja
  });
});
  buildBoje(filteredBoje, punktyMap);
}

/* ================= GENERALKA ================= */
function buildGeneralka(rows, bojeRows){
  const klubMap = {};
const startMap = new Set(
  rows.map(r => `${norm(r.ZAWODNIK)}|${norm(r.KONKURENCJA)}`)
);
  (bojeRows || []).forEach(r => {
    if (r.zawodnik && r.klub) {
      klubMap[norm(r.zawodnik)] = r.klub;
    }
  });

  let compsInCategory;

const key = norm(CATEGORY_KEY);

// 👉 tylko dla Masters
if (key.includes("masters")) {

  compsInCategory = ["SNUB3'","2KBSQ1RM","TGU1RM"];

} else {

  compsInCategory = [...new Set(rows.map(r => r.KONKURENCJA))];

}
  if(!rows.length) return;

  if(!SHOW_GENERALKA){
    document.getElementById("generalka").style.display="none";
    document.getElementById("generalkaInfo").style.display="block";
    return;
  }

  document.getElementById("generalka").style.display="";
  document.getElementById("generalkaInfo").style.display="none";

 const byAth = {};

rows.forEach(r => {

  // 👉 tylko dla Masters filtrujemy konkurencje
  if (key.includes("masters") && !compsInCategory.includes(r.KONKURENCJA)) {
    return;
  }

  if (!byAth[r.ZAWODNIK]) {
    byAth[r.ZAWODNIK] = {
      name: r.ZAWODNIK,
      klub: klubMap[norm(r.ZAWODNIK)] || "-",
      waga: r.WAGA || "-",
      sum: 0,
      pts: {}
    };
  }

  byAth[r.ZAWODNIK].pts[r.KONKURENCJA] = Number(r.PKT) || 0;
});

  const athletesCount = Object.keys(byAth).length;

// uzupełniamy brakujące konkurencje
Object.values(byAth).forEach(a => {
  compsInCategory.forEach(c => {

    const isTiebreak = /TIEBREAK/i.test(c);

    if (a.pts[c] == null) {
      if (isTiebreak) {
        a.pts[c] = 0; // 👈 NIE doliczamy karnego miejsca
      } else {
        a.pts[c] = athletesCount; // 👈 normalnie ostatnie miejsce
      }
    }

  });
});

// dopiero teraz liczymy sumę
Object.values(byAth).forEach(a=>{
  a.sum = Object.values(a.pts).reduce((s,v)=>s+v,0);
});

  document.querySelector("#generalka thead tr").innerHTML=`
    <th>M-ce</th><th>Zawodnik</th><th>Klub</th><th>Waga</th><th>SUMA</th>
    ${compsInCategory.map(c=>{
      const short = window.COMP_MAP[c]?.short || c;
      return `<th>${short.replace(/\s+/g, "<br>")}</th>`;
    }).join("")}
  `;

  const tbody=document.querySelector("#generalka tbody");
  tbody.innerHTML="";

  const sorted = Object.values(byAth).sort((a,b)=>a.sum-b.sum);

  let place = 0;
  let lastSum = null;

  sorted.forEach((r,i)=>{

    if (r.sum !== lastSum) {
      place = i + 1;
      lastSum = r.sum;
    }

    tbody.insertAdjacentHTML("beforeend",`
      <tr>
        <td>${place}</td>
        <td>${r.name}</td>
        <td>${r.klub}</td>
        <td>${r.waga}</td>
        <td>${fmt(r.sum)}</td>
        ${compsInCategory.map(c=>{
  const hasStart = startMap.has(`${norm(r.name)}|${norm(c)}`);
  const isTiebreak = /TIEBREAK/i.test(c);

  if(!hasStart) return `<td>-</td>`;

  const val = r.pts[c];

  return `<td>${isTiebreak ? fmt(val) : val}</td>`;
}).join("")}
      </tr>
    `);

  });
}

/* ================= BOJE ================= */
/* --- BEZ ZMIAN --- */
function buildBoje(rows, punktyMap){

  const box=document.getElementById("boje");
  box.innerHTML="";

  if(!rows.length){
    box.innerHTML="<p>Brak wyników</p>";
    return;
  }

  const byComp={};

  rows.forEach(r=>{
    if(!byComp[r.konkurencja]) byComp[r.konkurencja]={};

    if(!byComp[r.konkurencja][r.zawodnik]){
      byComp[r.konkurencja][r.zawodnik]={
        zawodnik:r.zawodnik,
        klub:r.klub,
        waga:r.waga,
        proby:[],
        odciezar:r.odciezar,
        powtorzenia:r.powtorzenia,
        wynik:r.wynik
      };
    }

    if(r.proba){
      byComp[r.konkurencja][r.zawodnik].proby.push({
        nr:r.proba,
        val:r.wynik
      });
    }
  });

  COMP_ORDER.forEach(comp=>{

    const athletes=byComp[comp];
    if(!athletes) return;

    const list=Object.values(athletes);

    /* ===== DODAJEMY PUNKTY ===== */

    list.forEach(a=>{
  const key = norm(a.zawodnik)+"|"+norm(comp);

  a.punkty = Number(punktyMap[key]?.pkt ?? 0);
  a.wynikFinal = punktyMap[key]?.wynik ?? null;
});

    /* ===== SORTOWANIE ===== */

    list.sort((a,b)=>a.punkty-b.punkty);

    const fullName = window.COMP_MAP[comp]?.full || comp;

box.insertAdjacentHTML("beforeend",`<h2>🏋️ ${fullName}</h2>`);

    let html=`<table><thead><tr>
      <th>M-ce</th>
      <th>Zawodnik</th>
      <th>Klub</th>
      <th>Waga</th>`;

    if(cleanComp(comp).includes("SN")){
  html+=`<th>Odważnik</th><th>Powt.</th><th>Total</th><th>Wynik</th><th>Punkty</th>`;
}
    else if(/TIEBREAK/i.test(comp)){
      html+=`<th>Wynik</th><th>Punkty</th>`;
    } 
    else{
      html+=`<th>P1</th><th>P2</th><th>P3</th><th>MAX</th><th>Wynik</th><th>Punkty</th>`;
    }

  html+=`</tr></thead><tbody>`;

let place = 0;
let lastPts = null;

list.forEach((a,i)=>{

  if (a.punkty !== lastPts) {
    place = i + 1;
    lastPts = a.punkty;
  }

  html+=`<tr>
    <td>${place}</td>
    <td>${a.zawodnik}</td>
    <td>${a.klub||"-"}</td>
    <td>${a.waga||"-"}</td>`;

      if(cleanComp(comp).includes("SN")){

        html+=`
  <td>${a.odciezar}</td>
  <td>${a.powtorzenia}</td>
  <td>${a.wynik}</td> <!-- TOTAL -->
  <td>${a.wynikFinal != null ? Number(a.wynikFinal).toFixed(2) : "-"}</td> <!-- WYNIK -->
  <td>${a.punkty}</td>`;

      }
      else if(/TIEBREAK/i.test(comp)){

        html+=`
          <td>${a.wynik}</td>
          <td>${a.wynikFinal != null ? Number(a.wynikFinal).toFixed(2) : "-"}</td>
          <td>${a.punkty}</td>`;

      }
      else{

        const p=a.proby.sort((x,y)=>x.nr-y.nr).map(x=>Number(x.val));
const max=p.length ? Math.max(...p) : "-";

        html+=`
          <td>${p[0]||"-"}</td>
          <td>${p[1]||"-"}</td>
          <td>${p[2]||"-"}</td>
          <td>${max}</td>
          <td>${a.wynikFinal != null ? Number(a.wynikFinal).toFixed(2) : "-"}</td>
          <td>${a.punkty}</td>`;
      }

      html+=`</tr>`;

    });

    html+=`</tbody></table>`;

    box.insertAdjacentHTML("beforeend",html);

  });

}

/* ================= FILTER ================= */
document.getElementById("filterInput").addEventListener("input",e=>{
  const q=norm(e.target.value);
  document.querySelectorAll("#generalka tbody tr, #boje tbody tr").forEach(tr=>{
    tr.style.display=tr.textContent.toLowerCase().includes(q)?"":"none";
  });
});

/* ================= SERVICE WORKER ================= */
if("serviceWorker"in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

/* ================= START ================= */
loadAll();

  document.getElementById("backBtn").addEventListener("click", function(e) {
  e.preventDefault();

  let path = window.location.pathname;

  path = path.substring(0, path.lastIndexOf("/"));

  function goUp(p) {
    if (p === "" || p === "/") {
      window.location.href = "/index.html";
      return;
    }

    fetch(p + "/index.html", { method: "HEAD" })
      .then(res => {
        if (res.ok) {
          window.location.href = p + "/index.html";
        } else {
          goUp(p.substring(0, p.lastIndexOf("/")));
        }
      })
      .catch(() => {
        window.location.href = "/index.html";
      });
  }

  goUp(path);
});
</script>

</body>
</html>
