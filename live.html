<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista startowa</title>

<style>
body{
  background:#0b1e2d;
  font-family:Arial;
  margin:0;
  padding:20px;
}

h1{
  color:white;
}

</style>
</head>

<body>

<h1 style="text-align:center;">Lista startowa</h1>
<div id="live"></div>

<script>

const API_BASE = "https://script.google.com/macros/s/AKfycbyWhUsE8mxQeGs2LBGN3lWTVvIrqGtvoGX61z61QPilUpOXT6vImh1gg9z1IPQ18kvmhg/exec";
function formatTime(t){

  if(!t) return "--:--";

  // jeśli normalna godzina
  if(typeof t === "string" && t.includes(":")){
    return t;
  }

  // jeśli dziwna data z Sheets
  const d = new Date(t);

  if(!isNaN(d)){
    return d.toLocaleTimeString("pl-PL", {
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  return t;
}
async function load(){

  const res = await fetch(API_BASE + "?api=getStartlist");
  const data = await res.json();

  let html = '';

  data.forEach(block => {

    html += `
      <div style="margin-bottom:40px;">
        <h2 style="color:white;">
          ${cleanCategory(block.category)}
        </h2>

        <div style="color:#4fc3f7;margin-bottom:15px;font-size:18px;font-weight:bold;">
          🕒 ${formatTime(block.startTime)}
        </div>

        <div style="display:flex;flex-wrap:wrap;gap:20px;">
    `;

    block.stations.forEach(st => {

      html += `
        <div style="
          background:#12384d;
          color:white;
          padding:15px;
          border-radius:10px;
          min-width:250px;
        ">
          <h3>Stanowisko ${st.station}</h3>

          <div style="margin-bottom:10px;">
            👨‍⚖️ ${st.judge || "-"}
          </div>

          <ul style="list-style:none;padding:0;">
      `;

      st.athletes.forEach(a => {
        html += `
          <li style="padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.2);">
            ${a.name}
            <br>
            <span style="font-size:12px;opacity:0.7;">
              ${cleanCategory(a.category)}
            </span>
          </li>
        `;
      });

      html += `</ul></div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById("live").innerHTML = html;
}

// auto refresh
setInterval(load, 10000);

load();
function cleanCategory(cat){
  return (cat || "").replace(/^k:/i,"").trim();
}
</script>

</body>
</html>
