async function loginJudge(){

  const password = document.getElementById("password").value;

  const btn = document.querySelector("#loginBox button");
  const spinner = document.getElementById("loginSpinner");

  
  btn.disabled = true;
  btn.innerText = "Logowanie...";
  spinner.style.display = "block";

  try{

    const res = await fetch(
      API_BASE + `?api=login&login=${login}&password=${password}`
    );

    const data = await res.json();

    if(data.ok){

      sessionStorage.setItem("session_token", data.token);
      location.reload();

    }else{

function getMainCategory(cat){
  if(!cat) return cat;

  return cat.split(",")[0].trim();
}

/* =======================
   GROUP
======================= */

function groupByCategory(rows){

  const g={};

  rows.forEach(r=>{

    const mainCat = getMainCategory(r.kategoria);

if(!g[mainCat]) g[mainCat]=[];

g[mainCat].push(r);

  });

  return g;

}

if(match && !seen.has(key)){

}

 const type = document.getElementById("competitionSelect").value;

/* =======================
   SAVE WEIGHT
======================= */

async function saveWeight(zawodnik,i){

  const btn = event.target;

  
  if(btn.dataset.loading === "1") return;
  btn.dataset.loading = "1";

  const input = document.getElementById("w_"+i);
  input.disabled = true;

  const waga = input.value;
  const currentWeight = input.getAttribute("data-current") || "";

  
  const hasResults = (window.RESULTS_RAW || []).some(r =>
    r.zawodnik === zawodnik &&
    Number(r.wynik) > 0
  );

  
  if(currentWeight !== "" && hasResults){
    alert("❌ Zawodnik ma już wyniki — zmiana wagi tylko w arkuszu");
    btn.dataset.loading = "0";
    input.disabled = false;
    return;
  }

 
  if(currentWeight === "" && hasResults){
    const confirmed = confirm(
      "⚠️ Są już wyniki dla tego zawodnika.\nCzy na pewno chcesz dodać wagę?"
    );
    if(!confirmed){
      btn.dataset.loading = "0";
      input.disabled = false;
      return;
    }
  }

  
  if(currentWeight !== "" && !hasResults){
    const confirmed = confirm(
      `UWAGA!\nZawodnik ma już wagę: ${currentWeight} kg.\nNadpisujesz na: ${waga} kg\n\nCzy na pewno?`
    );
    if(!confirmed){
      btn.dataset.loading = "0";
      input.disabled = false;
      return;
    }
  }

  const token = sessionStorage.getItem("session_token");
  const row = btn.closest("tr");

  btn.disabled = true;
  btn.innerText = "⏳...";

  const res = await fetch(
    API_BASE+
    `?api=saveWeight`+
    `&token=${token}`+
    `&zawodnik=${encodeURIComponent(zawodnik)}`+
    `&waga=${waga}`
  );

  const data = await res.json();

  if(data.ok){

    
    btn.innerText="✔ Zapisano";
    btn.style.background="#4CAF50";
    btn.style.color="white";

    row.classList.add("weighted");

    input.value = waga;
    input.setAttribute("data-current", waga);

    
    Object.keys(grouped).forEach(cat => {
      grouped[cat].forEach(a => {
        if (a.zawodnik === zawodnik) {
          a.waga = waga;
        }
      });
    });

    // ⏱ reset UI
    setTimeout(()=>{
      btn.innerText = "Zapisz";
      btn.disabled = false;
      input.disabled = false;
      btn.dataset.loading = "0";
    }, 1500);

  }else{

    btn.innerText="Błąd";
    btn.style.background="#f44336";
    btn.disabled = false;
    input.disabled = false;
    btn.dataset.loading = "0";

  }
}

function splitGroup(athletes, stations) {
  const result = Array.from({ length: stations }, () => []);
  let i = 0;

  athletes.forEach(a => {
    result[i].push(a);
    i = (i + 1) % stations;
  });

  return result;
}
  function sortAthletes(arr){
  return arr.sort((a,b)=>
    (a.zawodnik || "").localeCompare(b.zawodnik || "","pl")
  );
}

function mixCategories(selectedCats){
  const arrays = selectedCats.map(cat => sortAthletes([...(grouped[cat] || [])]));

  const result = [];
  let i = 0;

  while (arrays.some(arr => arr.length > i)) {
    arrays.forEach(arr => {
      if (arr[i]) result.push(arr[i]);
    });
    i++;
  }

  return result;
}
  function fillStationsSmart(structure, athletes){

  const slots = structure.map(s => s.length);
  const result = slots.map(() => []);

  let pool = sortAthletes([...athletes]);

  let i = 0;

  while (pool.length > 0) {

    const stationOrder = [...result.keys()]
      .sort((a,b) => slots[b] - slots[a]);

    const stationIndex = stationOrder[i % stationOrder.length];

    if (result[stationIndex].length < slots[stationIndex]) {
      result[stationIndex].push(pool.shift());
    }

    i++;

    if (i > result.length * 20) break;
  }

  return result;
}
  function splitIndividual(athletes, stations) {
  const n = athletes.length;

  if (n <= 16) {
    return splitIntoRounds(athletes, 2);
  }

  let rounds = Math.ceil(n / stations) - 2;
  if (rounds < 1) rounds = 1;

  const used = rounds * stations;
  const remaining = athletes.slice(used);

  const result = [];

  for (let r = 0; r < rounds; r++) {
    result.push(athletes.slice(r * stations, (r + 1) * stations));
  }

  const half = Math.ceil(remaining.length / 2);

  result.push(remaining.slice(0, half));
  result.push(remaining.slice(half));

  return result;
}
   function splitIntoRounds(arr, rounds) {
  const size = Math.ceil(arr.length / rounds);
  const result = [];

  for (let i = 0; i < rounds; i++) {
    result.push(arr.slice(i * size, (i + 1) * size));
  }

  return result;
}
  function splitIndividualToStations(athletes, stations) {

  const n = athletes.length;

  if (stations <= 0) return [];

  const rounds = Math.ceil(n / stations);

  
  if (rounds <= 2) {
    return splitGroup(athletes, stations);
  }

  // standardowy przypadek (>2 rundy)
  let fullRounds = rounds - 2;

  const fullCount = fullRounds * stations;
  const remaining = n - fullCount;

  const perStation = Array(stations).fill(fullRounds);

  const round1 = Math.ceil(remaining / 2);
  const round2 = remaining - round1;

  for (let i = 0; i < round1; i++) {
    perStation[i]++;
  }

  for (let i = 0; i < round2; i++) {
    perStation[i]++;
  }

  const result = Array.from({ length: stations }, () => []);

  let index = 0;

  for (let s = 0; s < stations; s++) {
    for (let k = 0; k < perStation[s]; k++) {
      if (athletes[index]) {
        result[s].push(athletes[index]);
        index++;
      }
    }
  }

  return result;
}

  function getGroupCompetitions(data){

    (a.kategoria || "").toLowerCase().includes("pro") ||
    (a.kategoria_dodatkowa || "").toLowerCase().includes("pro")
  );

  // PRESS
  if(hasPro){
    comps.push("2KBPR1RM");
  }else{
    comps.push("1KBPR1RM");
  }

  // SQUAT zawsze
  comps.push("2KBSQ1RM");

  return comps;
}

  if(c === "2KBPR1RM") return "2KB PRESS";
  if(c === "2KBSQ1RM") return "2KB SQUAT";
  return c;
}
 function printStation(index){

const COMP_LABELS = {

const comp = (COMP_LABELS[compRaw] || []).join(" | ");
   let competitionsToPrint = [];

if(compRaw === "group"){
  competitionsToPrint = getGroupCompetitions(data);
}else{
  competitionsToPrint = ["SNATCH"];

  function computeBestFromRaw(results){
if(!Array.isArray(results)){
    console.error("❌ results NIE jest tablicą:", results);
    return {
      TGU:{M:[],K:[]},
      SNATCH:{
        Junior:{M:[],K:[]},
        Amator:{M:[],K:[]},
        Pro:{M:[],K:[]}
      }
    };
  }
  const out = {
    TGU: { M: [], K: [] },
    SNATCH: {
  Junior: { M:[], K:[] },
  Amator: {}, 
  Pro: {}
}
  };

  function getGender(kat){
    if(!kat) return null;
    if(kat.includes("K:K") || kat.includes("Dz")) return "K";
    if(kat.includes("K:M") || kat.includes("Ch")) return "M";
    return null;
  }

  function getLevel(kat){
    if(!kat) return null;
    if(kat.includes("Junior")) return "Junior";
    if(kat.includes("Amator")) return "Amator";
    if(kat.includes("PRO")) return "Pro";
    return null;
  }

  function getWeight(w){
    const val = Number(w);
    return val > 0 ? val : 999;
  }

  const tguMap = {};
  const snatchMap = {};

  results.forEach(r => {
    const kat = r.kategoria || r.kategoria_dodatkowa;
    if(!kat) return;

    const gender = getGender(kat);
    if(!gender) return;

    const wynik = Number(r.wynik) || 0;
    if(wynik <= 0) return;

    const weight = getWeight(r.waga);

    const keyBase = r.zawodnik + "|" + gender;

    // ===== TGU =====
    if(r.konkurencja === "TGU1RM"){

      const key = keyBase;

      if(!tguMap[key] || wynik > tguMap[key].wynik){
        tguMap[key] = {
          zawodnik: r.zawodnik,
          wynik,
          waga: weight,
          klub: r.klub,
          gender
        };
      }
    }

    // ===== SNATCH =====
    if(r.konkurencja === "SNUB3'"){

      const level = getLevel(kat);
      if(!level) return;

      const key = keyBase + "|" + level + "|" + (r.kategoria || "");

     if(!snatchMap[key] || wynik > snatchMap[key].wynik){
  snatchMap[key] = {
    zawodnik: r.zawodnik,
    wynik,
    waga: weight,
    klub: r.klub,
    gender,
    level,
    kategoria: kat 
  };
}
    }

  });

  // ===== SORT TGU =====
  Object.values(tguMap).forEach(r=>{
    out.TGU[r.gender].push(r);
  });

  ["M","K"].forEach(g=>{
    out.TGU[g].sort((a,b)=>{
      if(b.wynik !== a.wynik) return b.wynik - a.wynik;
      return a.waga - b.waga;
    });
    out.TGU[g] = out.TGU[g].slice(0,3);
  });

 // ===== WRZUCANIE DO STRUKTURY =====
Object.values(snatchMap).forEach(r=>{

  if(r.level === "Amator"){

   const cat = (r.kategoria || "UNKNOWN").replace(/^k:/i,"");

    if(!out.SNATCH.Amator[cat]){
      out.SNATCH.Amator[cat] = [];
    }

    out.SNATCH.Amator[cat].push(r);

  }else{

 if(r.level === "Pro"){

  if(!out.SNATCH.Pro[r.gender]){
    out.SNATCH.Pro[r.gender] = [];
  }

  out.SNATCH.Pro[r.gender].push(r);

}else{
    out.SNATCH[r.level][r.gender].push(r);
  }

}

});


// ===== SORT AMATOR (po kategoriach) =====
Object.keys(out.SNATCH.Amator).forEach(cat => {

  out.SNATCH.Amator[cat].sort((a,b)=>{
    if(b.wynik !== a.wynik) return b.wynik - a.wynik;
    return a.waga - b.waga;
  });

  out.SNATCH.Amator[cat] =
  out.SNATCH.Amator[cat].slice(0,1);

});
    // ===== SORT PRO =====
["K","M"].forEach(g=>{

  const list = out.SNATCH.Pro[g] || [];

  list.sort((a,b)=>{
    if(b.wynik !== a.wynik) return b.wynik - a.wynik;
    return a.waga - b.waga;
  });

  out.SNATCH.Pro[g] = list.slice(0,1);

});


// ===== SORT RESZTY (TYLKO JUNIOR) =====
["Junior"].forEach(level=>{
  ["K","M"].forEach(g=>{

    out.SNATCH[level][g].sort((a,b)=>{
      if(b.wynik !== a.wynik) return b.wynik - a.wynik;
      return a.waga - b.waga;
    });

    out.SNATCH[level][g] =
  out.SNATCH[level][g].slice(0,1);

  });
});

  return out;
}

  function normalizeCategoryName(cat){

  const c = cat.toUpperCase();

  // helpery
  const isK = c.includes("K:K");
  const isM = c.includes("K:M");

  const isJunior = c.includes("JUNIOR") || c.includes("U18");
  const isAmator = c.includes("AMATOR");
  const isPro = c.includes("PRO");
  const isMasters = c.includes("MASTERS");

  const isPlus = c.includes("+");

  // ===== JUNIOR =====
  if(isJunior && (isK || c.includes("DZ"))) return "JUNIOR DZ";
if(isJunior && (isM || c.includes("CH"))) return "JUNIOR CH";

  // ===== AMATOR =====
  if(isAmator && isK && isPlus) return "AMATOR K +65";
  if(isAmator && isK && !isPlus) return "AMATOR K 65";

  if(isAmator && isM && isPlus) return "AMATOR M +85";
  if(isAmator && isM && !isPlus) return "AMATOR M 85";

  // ===== PRO =====
  if(isPro && isK && isPlus) return "PRO K +65";
  if(isPro && isK && !isPlus) return "PRO K 65";

  if(isPro && isM && isPlus) return "PRO M +85";
  if(isPro && isM && !isPlus) return "PRO M 85";

  // ===== MASTERS =====
  if(isMasters && isK) return "MASTERS K";
  if(isMasters && isM) return "MASTERS M";

  // ===== ZĄBKOWICE =====
  if(c.includes("ZĄBKOWICZANKA")) return "NAJLEPSZA ZĄBKOWICZANKA";
  if(c.includes("ZĄBKOWICZANIN")) return "NAJLEPSZY ZĄBKOWICZANIN";

  return "OTHER";
}
  function buildFullResults(startlist, boje){

  const map = {};

  // index po zawodniku
  startlist.forEach(s => {
    map[s.zawodnik] = {
      ...s,
      results: []
    };
  });

  boje.forEach(b => {

    if(!map[b.zawodnik]){
      map[b.zawodnik] = {
        zawodnik: b.zawodnik,
        kategoria: b.kategoria,
        waga: b.waga,
        results: []
      };
    }

    map[b.zawodnik].results.push(b);

  });

  return Object.values(map);
}
  function getScore(r){

  const wynik = Number(r.wynik || 0);
  const waga = Number(r.waga || 0);

  if(wynik <= 0) return 0;

  // ✅ KLUCZOWE
  if(waga <= 0) return wynik;

  return wynik / waga;
}
