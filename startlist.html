<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listy startowe</title>

<link rel="stylesheet" href="style.css">

<style>

.tabs{
  margin-bottom:14px;
}

.tabs button{
  padding:8px 12px;
  margin:4px;
  cursor:pointer;
}

.startlist-actions{
  margin-bottom:12px;
}

table{
  border-collapse:collapse;
  width:100%;
  background:white;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
}

.weighted{
  background:#e7f6e7;
}

@media print{

  header,
  .tabs,
  .startlist-actions{
    display:none;
  }

  body{
    background:white;
  }

  table{
    font-size:12px;
  }

}

</style>
</head>

<body class="startlist-page">

<!-- LOGIN -->
<div id="loginBox">

<h2>Logowanie sędziego</h2>

<input id="login" placeholder="Login">
<input id="password" type="password" placeholder="Hasło">

<button onclick="loginJudge()">Zaloguj</button>

</div>


<header class="site-header">
<div class="header-inner">

<div class="header-title">
Hardstyle Kettlebell European Championship
</div>

<div class="header-links">
<a href="index.html">Wyniki</a>
<a href="#" onclick="window.print()">Drukuj</a>
</div>

</div>
</header>


<div class="page" id="startlistApp" style="display:none">

<div class="panel">

<h1>Listy startowe</h1>

<div class="tabs" id="tabs"></div>

<div class="startlist-actions">

<button onclick="window.print()">Drukuj</button>
<button onclick="exportPDF()">PDF</button>

<label class="filter-box">
<input type="checkbox" id="onlyUnweighted" onchange="filterUnweighted()">
<span>Tylko niezważeni</span>
</label>

<input 
id="searchAthlete"
placeholder="Szukaj zawodnika..."
onkeyup="filterSearch()"
style="margin-left:20px;padding:6px;width:220px"
>

</div>

<div id="content"></div>

</div>
</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

const API_BASE =
"https://script.google.com/macros/s/AKfycbyWhUsE8mxQeGs2LBGN3lWTVvIrqGtvoGX61z61QPilUpOXT6vImh1gg9z1IPQ18kvmhg/exec";

let grouped={};

/* =======================
   SESJA
======================= */

const TOKEN=localStorage.getItem("session_token");

if(TOKEN){

  document.getElementById("loginBox").style.display="none";
  document.getElementById("startlistApp").style.display="block";

  init();

}else{

  document.getElementById("loginBox").style.display="block";

}


/* =======================
   LOGIN
======================= */

async function loginJudge(){

  const login=document.getElementById("login").value;
  const password=document.getElementById("password").value;

  const res = await fetch(
    API_BASE + `?api=login&login=${login}&password=${password}`
  );

  const data = await res.json();

  if(data.ok){

    localStorage.setItem("session_token",data.token);

    location.reload();

  }else{

    alert("Błędny login");

  }

}


/* =======================
   STARTLIST
======================= */

async function init(){

  const token = localStorage.getItem("session_token");

  const res = await fetch(
    API_BASE + "?api=startlist&token=" + token
  );

  const data = await res.json();

  grouped = groupByCategory(data);

  renderTabs();

  showFirst();

}


/* =======================
   GROUP
======================= */

function groupByCategory(rows){

  const g={};

  rows.forEach(r=>{

    if(!g[r.kategoria]) g[r.kategoria]=[];

    g[r.kategoria].push(r);

  });

  return g;

}


/* =======================
   TABS
======================= */

function renderTabs(){

  const tabs=document.getElementById("tabs");

  tabs.innerHTML="";

  Object.keys(grouped).forEach(cat=>{

    const btn=document.createElement("button");

    btn.textContent=cat;

    btn.onclick=()=>renderTable(cat);

    tabs.appendChild(btn);

  });

}


/* =======================
   FIRST TAB
======================= */

function showFirst(){

  const first=Object.keys(grouped)[0];

  if(first) renderTable(first);

}


/* =======================
   TABLE
======================= */

function renderTable(category){

  const rows=[...grouped[category]];

  rows.sort((a,b)=>
    (a.zawodnik||"").localeCompare(b.zawodnik||"","pl")
  );

  const container=document.getElementById("content");

  let html=`
  <h2>${category}</h2>
  <table>
  <tbody>

  <tr>
  <th>LP</th>
  <th>Zawodnik</th>
  <th>Klub</th>
  <th>Kategoria dodatkowa</th>
  <th>Waga</th>
  </tr>
  `;

  rows.forEach((r,i)=>{

    html+=`

    <tr class="${r.waga ? 'weighted' : ''}">

    <td>${i+1}</td>

    <td>${r.zawodnik||""}</td>

    <td>${r.klub||""}</td>

    <td>${r.kategoria_dodatkowa||""}</td>

    <td>

      <input id="w_${i}" type="number"
value="${r.waga||""}"
style="width:80px;padding:4px;font-weight:bold;text-align:center">

      <button onclick="saveWeight('${r.zawodnik}',${i})">
      Zapisz
      </button>

    </td>

    </tr>

    `;

  });

  html+="</tbody></table>";

  container.innerHTML=html;

}


/* =======================
   SAVE WEIGHT
======================= */

async function saveWeight(zawodnik,i){

  const waga = document.getElementById("w_"+i).value;
  const token = localStorage.getItem("session_token");

  const btn = event.target;
  const row = btn.closest("tr");

  btn.disabled = true;
  btn.innerText = "Zapisywanie...";

  const res = await fetch(

    API_BASE+
    `?api=saveWeight`+
    `&token=${token}`+
    `&zawodnik=${encodeURIComponent(zawodnik)}`+
    `&waga=${waga}`

  );

  const data = await res.json();

  if(data.ok){

    btn.innerText="✔ Zapisano";
    btn.style.background="#4CAF50";
    btn.style.color="white";

    row.classList.add("weighted");

  }else{

    btn.innerText="Błąd";
    btn.style.background="#f44336";

  }

}


/* =======================
   FILTR NIEZWAŻONYCH
======================= */

function filterUnweighted(){

  const only=document.getElementById("onlyUnweighted").checked;

  document.querySelectorAll("#content tbody tr").forEach(tr=>{

    const input=tr.querySelector("input");

    if(!input) return;

    if(only && input.value){

      tr.style.display="none";

    }else{

      tr.style.display="";

    }

  });

}
function filterSearch(){

  const q = document
    .getElementById("searchAthlete")
    .value
    .toLowerCase();

  document.querySelectorAll("#content tbody tr").forEach(tr=>{

    const name = tr.children[1]?.innerText.toLowerCase() || "";

    if(name.includes(q)){
      tr.style.display="";
    }else{
      tr.style.display="none";
    }

  });

}

/* =======================
   PDF
======================= */

function exportPDF(){

  const element=document.getElementById("content");

  const category=document.querySelector("#content h2")?.textContent || "lista-startowa";

  html2pdf()
  .set({

    margin:[5,5,5,5],

    filename:category.replace(/\s+/g,"_")+".pdf",

    pagebreak:{mode:["css","legacy"]},

    html2canvas:{scale:2,scrollY:0},

    jsPDF:{
      unit:"mm",
      format:"a4",
      orientation:"landscape"
    }

  })
  .from(element)
  .save();

}

</script>

</body>
</html>
