<script>

const API_BASE =
"https://script.google.com/macros/s/AKfycbyWhUsE8mxQeGs2LBGN3lWTVvIrqGtvoGX61z61QPilUpOXT6vImh1gg9z1IPQ18kvmhg/exec";

let grouped={};
   let currentCategory = null;
  let JUDGES = [];
  let CURRENT_STATIONS = [];
const COMP_MAP = {
  "SNUB3'": { type: "individual" },
  "TGU1RM": { type: "group" },
  "1KBPR1RM": { type: "group" },
  "2KBPR1RM": { type: "group" },
  "2KBSQ1RM": { type: "group" },
  "TIEBREAK": { type: "manual" }
};
/* =======================
   SESJA
======================= */

const TOKEN = sessionStorage.getItem("session_token");

if (TOKEN) {

  document.getElementById("loginBox").style.display="none";
  document.getElementById("startlistApp").style.display="block";

  init();

}else{

  document.getElementById("loginBox").style.display="block";

}


/* =======================
   LOGIN
======================= */

async function loginJudge(){

  const login = document.getElementById("login").value;
  const password = document.getElementById("password").value;

  const res = await fetch(
    API_BASE + `?api=login&login=${login}&password=${password}`
  );

  const data = await res.json();

  if(data.ok){

    sessionStorage.setItem("session_token", data.token);

    location.reload();

  }else{

    alert("Błędny login");

  }

}

/* =======================
   STARTLIST
======================= */

async function init(){

  const TOKEN = sessionStorage.getItem("session_token");

const res = await fetch(
  API_BASE + "?api=startlist&token=" + TOKEN
);

 const data = await res.json();
  console.log("STARTLIST DATA:", data);
// 🔥 POBIERAMY BOJE (POPRAWNY ENDPOINT)
const res2 = await fetch(
  API_BASE + "?api=boje&token=" + TOKEN
);

const resultsRaw = await res2.json();
// zapis globalny
window.RESULTS_RAW = resultsRaw;

// liczymy BEST
let raw = [];

if (Array.isArray(resultsRaw)) {
  raw = resultsRaw;
}
else if (Array.isArray(resultsRaw.data)) {
  raw = resultsRaw.data;
}
else if (Array.isArray(resultsRaw.results)) {
  raw = resultsRaw.results;
}
else if (Array.isArray(resultsRaw.items)) {
  raw = resultsRaw.items;
}
else {
  console.error("❌ NIEZNANA STRUKTURA results_raw:", resultsRaw);
}

window.BEST = computeBestFromRaw(raw);

const settingsRes = await fetch(API_BASE + "?settings=1");
const settingsData = await settingsRes.json();


const s = settingsData.settings || settingsData;

JUDGES = s.judges || [];

grouped = groupByCategory(data);

  renderTabs();

  showFirst();

}
function getMainCategory(cat){
  if(!cat) return cat;

  return cat.split(",")[0].trim();
}

/* =======================
   GROUP
======================= */

function groupByCategory(rows){

  const g={};

  rows.forEach(r=>{

    const mainCat = getMainCategory(r.kategoria);

if(!g[mainCat]) g[mainCat]=[];

g[mainCat].push(r);

  });

  return g;

}


/* =======================
   TABS
======================= */

function renderTabs(){

  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  Object.keys(grouped).forEach(cat => {

    const wrapper = document.createElement("label");
    wrapper.style.marginRight = "15px";
    wrapper.style.color = "#ffffff";
    wrapper.style.display = "inline-flex";
    wrapper.style.alignItems = "center";
    wrapper.style.gap = "6px";
    wrapper.style.cursor = "pointer";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.value = cat;
    checkbox.className = "catCheck";
    checkbox.style.transform = "scale(1.2)";

    // kliknięcie w nazwę kategorii nadal pokazuje tabelę
    wrapper.onclick = () => renderTable(cat);

    wrapper.appendChild(checkbox);
    wrapper.append(" " + cat.replace(/^k:/i, ""));

    tabs.appendChild(wrapper);

  });

  // przycisk stanowiska
  const btn = document.createElement("button");
  btn.textContent = "Stanowiska";
  btn.onclick = showStations;
  btn.style.marginLeft = "10px";

  tabs.appendChild(btn);
  // 🔥 BEST BUTTON
const bestBtn = document.createElement("button");
bestBtn.textContent = "🏆 BEST";
bestBtn.onclick = renderBest;
bestBtn.style.marginLeft = "10px";

tabs.appendChild(bestBtn);
}


/* =======================
   FIRST TAB
======================= */

function showFirst(){

  const first=Object.keys(grouped)[0];

  if(first) renderTable(first);

}

  function showStations(){

  if (!currentCategory) {
    alert("Najpierw wybierz kategorię");
    return;
  }

  const checked = document.querySelectorAll(".catCheck:checked");

if (checked.length === 0) {
  alert("Wybierz przynajmniej jedną kategorię");
  return;
}

let athletes = [];

checked.forEach(c => {
  const cat = c.value;
  athletes = athletes.concat(grouped[cat] || []);
});

  const stations = parseInt(document.getElementById("stationsInput").value) || 1;

  const comp = document.getElementById("competitionSelect").value;
  const type = COMP_MAP[comp]?.type;

  let result;

  if (type === "group") {
    result = splitGroup(athletes, stations);
  } else if (type === "individual") {
    result = splitIndividualToStations(athletes, stations);
  } else {
    alert("Manual competition");
    return;
  }

  CURRENT_STATIONS = result;
renderStations(result);
}

/* =======================
   TABLE
======================= */
function renderTable(category){

  currentCategory = category;

  const rows=[...grouped[category]];

  rows.sort((a,b)=>
    (a.zawodnik||"").localeCompare(b.zawodnik||"","pl")
  );

  const container=document.getElementById("content");

  let html=`
<h2 class="category-title">
  ${category.replace(/^k:/i, "")}
</h2>

<div class="table-wrap">
<table>

  <thead>
  <tr>
  <th>LP</th>
  <th>Zawodnik</th>
  <th>Klub</th>
  <th>Kategoria dodatkowa</th>
  <th>Waga</th>
  </tr>
  </thead>

  <tbody>
  `;

  rows.forEach((r,i)=>{

    html+=`

    <tr class="${r.waga ? 'weighted' : ''}">

    <td>${i+1}</td>

    <td>${r.zawodnik||""}</td>

    <td>${r.klub||""}</td>

    <td>${r.kategoria_dodatkowa||""}</td>

    <td>

      <input
        id="w_${i}"
        type="number"
        value="${r.waga||""}"
        style="width:80px;padding:4px;font-weight:bold;text-align:center"
      >

      <button
        class="save-weight"
        onclick="saveWeight('${r.zawodnik}',${i})"
      >
      Zapisz
      </button>

    </td>

    </tr>

    `;

  });

  html+="</tbody></table></div>";

  container.innerHTML=html;

}

/* =======================
   SAVE WEIGHT
======================= */

async function saveWeight(zawodnik,i){

  const waga = document.getElementById("w_"+i).value;
  const token = sessionStorage.getItem("session_token");

  const btn = event.target;
  const row = btn.closest("tr");

  btn.disabled = true;
  btn.innerText = "Zapisywanie...";

  const res = await fetch(

    API_BASE+
    `?api=saveWeight`+
    `&token=${token}`+
    `&zawodnik=${encodeURIComponent(zawodnik)}`+
    `&waga=${waga}`

  );

  const data = await res.json();

  if(data.ok){

    btn.innerText="✔ Zapisano";
    btn.style.background="#4CAF50";
    btn.style.color="white";

    row.classList.add("weighted");

  }else{

    btn.innerText="Błąd";
    btn.style.background="#f44336";

  }

}


/* =======================
   FILTR NIEZWAŻONYCH
======================= */

function filterUnweighted(){

  const only=document.getElementById("onlyUnweighted").checked;

  document.querySelectorAll("#content tbody tr").forEach(tr=>{

    const input=tr.querySelector("input");

    if(!input) return;

    if(only && input.value){

      tr.style.display="none";

    }else{

      tr.style.display="";

    }

  });

}
function filterSearch(){

  const q = document
    .getElementById("searchAthlete")
    .value
    .toLowerCase();

  document.querySelectorAll("#content tbody tr").forEach(tr=>{

    const name = tr.children[1]?.innerText.toLowerCase() || "";

    if(name.includes(q)){
      tr.style.display="";
    }else{
      tr.style.display="none";
    }

  });

}

/* =======================
   PDF
======================= */

function exportPDF(){

  const element = document.getElementById("content");

  const category =
    document.querySelector("#content h2")?.textContent || "lista-startowa";

  /* ukryj przyciski "Zapisz" */
  const buttons = document.querySelectorAll(".save-weight");
  buttons.forEach(btn => btn.style.display = "none");

  html2pdf()
    .set({

      margin:[5,5,5,5],

      filename:category.replace(/\s+/g,"_")+".pdf",

      pagebreak:{mode:["css","legacy"]},

      html2canvas:{
        scale:2,
        scrollY:0
      },

      jsPDF:{
        unit:"mm",
        format:"a4",
        orientation:"landscape"
      }

    })
    .from(element)
    .save()
    .then(() => {

      /* przywróć przyciski po wygenerowaniu PDF */
      buttons.forEach(btn => btn.style.display = "inline-block");

    });

}
function splitGroup(athletes, stations) {
  const result = Array.from({ length: stations }, () => []);
  let i = 0;

  athletes.forEach(a => {
    result[i].push(a);
    i = (i + 1) % stations;
  });

  return result;
}
  function splitIndividual(athletes, stations) {
  const n = athletes.length;

  if (n <= 16) {
    return splitIntoRounds(athletes, 2);
  }

  let rounds = Math.ceil(n / stations) - 2;
  if (rounds < 1) rounds = 1;

  const used = rounds * stations;
  const remaining = athletes.slice(used);

  const result = [];

  for (let r = 0; r < rounds; r++) {
    result.push(athletes.slice(r * stations, (r + 1) * stations));
  }

  const half = Math.ceil(remaining.length / 2);

  result.push(remaining.slice(0, half));
  result.push(remaining.slice(half));

  return result;
}
   function splitIntoRounds(arr, rounds) {
  const size = Math.ceil(arr.length / rounds);
  const result = [];

  for (let i = 0; i < rounds; i++) {
    result.push(arr.slice(i * size, (i + 1) * size));
  }

  return result;
}
  function splitIndividualToStations(athletes, stations) {

  const n = athletes.length;

  if (stations <= 0) return [];

  const rounds = Math.ceil(n / stations);

  // 🔥 NOWY WARUNEK (KLUCZOWY)
  if (rounds <= 2) {
    return splitGroup(athletes, stations);
  }

  // standardowy przypadek (>2 rundy)
  let fullRounds = rounds - 2;

  const fullCount = fullRounds * stations;
  const remaining = n - fullCount;

  const perStation = Array(stations).fill(fullRounds);

  const round1 = Math.ceil(remaining / 2);
  const round2 = remaining - round1;

  for (let i = 0; i < round1; i++) {
    perStation[i]++;
  }

  for (let i = 0; i < round2; i++) {
    perStation[i]++;
  }

  const result = Array.from({ length: stations }, () => []);

  let index = 0;

  for (let s = 0; s < stations; s++) {
    for (let k = 0; k < perStation[s]; k++) {
      if (athletes[index]) {
        result[s].push(athletes[index]);
        index++;
      }
    }
  }

  return result;
}
  function clearCategorySelection(){

  document.querySelectorAll(".catCheck").forEach(cb=>{
    cb.checked = false;
  });

}
  function exportExcel(){

  const rows = [];

  document.querySelectorAll("#content ul").forEach((ul, i) => {

    const station = "Stanowisko " + (i+1);

    ul.querySelectorAll("li").forEach(li => {

      rows.push([
        station,
        li.innerText.replace(/\n/g," ")
      ]);

    });

  });

  let csv = "Stanowisko,Zawodnik\n";

  rows.forEach(r=>{
    csv += r.join(",") + "\n";
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "stanowiska.csv";
  a.click();

function updateJudgeSelections(){

  const selects = document.querySelectorAll(".judgeSelect");

  const selected = [];

  selects.forEach(s => {
    if (s.value) selected.push(s.value);
  });

  selects.forEach(select => {

    const current = select.value;

    select.innerHTML = '<option value="">-- wybierz sędziego --</option>';

    JUDGES.forEach(j => {

      if (!selected.includes(j) || j === current) {

        const opt = document.createElement("option");
        opt.value = j;
        opt.textContent = j;

        if (j === current) opt.selected = true;

        select.appendChild(opt);
      }

    });

  });

}
  function computeBestFromRaw(results){
if(!Array.isArray(results)){
    console.error("❌ results NIE jest tablicą:", results);
    return {
      TGU:{M:[],K:[]},
      SNATCH:{
        Junior:{M:[],K:[]},
        Amator:{M:[],K:[]},
        Pro:{M:[],K:[]}
      }
    };
  }
  const out = {
    TGU: { M: [], K: [] },
    SNATCH: {
      Junior: { M: [], K: [] },
      Amator: { M: [], K: [] },
      Pro: { M: [], K: [] }
    }
  };

  function getGender(kat){
    if(!kat) return null;
    if(kat.includes("K:K") || kat.includes("Dz")) return "K";
    if(kat.includes("K:M") || kat.includes("Ch")) return "M";
    return null;
  }

  function getLevel(kat){
    if(!kat) return null;
    if(kat.includes("Junior")) return "Junior";
    if(kat.includes("Amator")) return "Amator";
    if(kat.includes("PRO")) return "Pro";
    return null;
  }

  function getWeight(w){
    const val = Number(w);
    return val > 0 ? val : 999;
  }

  const tguMap = {};
  const snatchMap = {};

  results.forEach(r => {
    const kat = r.kategoria || r.kategoria_dodatkowa;
    if(!kat) return;

    const gender = getGender(kat);
    if(!gender) return;

    const wynik = Number(r.wynik) || 0;
    if(wynik <= 0) return;

    const weight = getWeight(r.waga);

    const keyBase = r.zawodnik + "|" + gender;

    // ===== TGU =====
    if(r.konkurencja === "TGU1RM"){

      const key = keyBase;

      if(!tguMap[key] || wynik > tguMap[key].wynik){
        tguMap[key] = {
          zawodnik: r.zawodnik,
          wynik,
          waga: weight,
          klub: r.klub,
          gender
        };
      }
    }

    // ===== SNATCH =====
    if(r.konkurencja === "SNUB3'"){

      const level = getLevel(kat);
      if(!level) return;

      const key = keyBase + "|" + level;

      if(!snatchMap[key] || wynik > snatchMap[key].wynik){
        snatchMap[key] = {
          zawodnik: r.zawodnik,
          wynik,
          waga: weight,
          klub: r.klub,
          gender,
          level
        };
      }
    }

  });

  // ===== SORT TGU =====
  Object.values(tguMap).forEach(r=>{
    out.TGU[r.gender].push(r);
  });

  ["M","K"].forEach(g=>{
    out.TGU[g].sort((a,b)=>{
      if(b.wynik !== a.wynik) return b.wynik - a.wynik;
      return a.waga - b.waga;
    });
    out.TGU[g] = out.TGU[g].slice(0,3);
  });

  // ===== SORT SNATCH =====
  Object.values(snatchMap).forEach(r=>{
    out.SNATCH[r.level][r.gender].push(r);
  });

  ["Junior","Amator","Pro"].forEach(level=>{
    ["M","K"].forEach(g=>{
      out.SNATCH[level][g].sort((a,b)=>{
        if(b.wynik !== a.wynik) return b.wynik - a.wynik;
        return a.waga - b.waga;
      });
      out.SNATCH[level][g] = out.SNATCH[level][g].slice(0,3);
    });
  });

  return out;
}

  function renderBest(){

  const best = window.BEST;

  if(!best){
    alert("Brak danych BEST");
    return;
  }

  let html = `<h2 style="color:#fff;text-align:center;">🏆 BEST OF COMPETITION</h2>`;

  // ===== TGU =====
  html += `<h3 style="color:#fff;">TGU</h3>`;

  ["K","M"].forEach(g=>{

  html += `<h4 style="color:#fff;">${g==="K"?"Kobiety":"Mężczyźni"}</h4>`;

  const list = best.TGU[g] || [];

  if(list.length === 0){
    html += `<div style="color:#aaa;">Brak wyników</div>`;
  }

  list.forEach((r,i)=>{
    html += `<div style="color:#fff;">${i+1}. ${r.zawodnik} (${r.wynik} kg)</div>`;
  });

});

  // ===== SNATCH =====
  html += `<h3 style="color:#fff;">SNATCH</h3>`;

  ["Junior","Amator","Pro"].forEach(level=>{

  html += `<h4 style="color:#fff;">${level}</h4>`;

  ["K","M"].forEach(g=>{

    html += `<div style="color:#ccc;margin-left:10px;">
      <b>${g==="K"?"Kobiety":"Mężczyźni"}</b>
    </div>`;

    const list = (best.SNATCH[level] && best.SNATCH[level][g]) || [];

    if(list.length === 0){
      html += `<div style="color:#aaa;margin-left:20px;">Brak wyników</div>`;
    }

    list.forEach((r,i)=>{
      html += `
        <div style="color:#fff;margin-left:20px;">
          ${i+1}. ${r.zawodnik} (${r.wynik})
        </div>
      `;
    });

  });

});

  document.getElementById("content").innerHTML = html;
}
  function goToJudgePanel(){

  const token = sessionStorage.getItem("session_token");

  if(!token){
    alert("Brak sesji");
    return;
  }

  window.location.href = "judge.html?token=" + token;

}
