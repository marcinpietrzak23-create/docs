<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listy startowe</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="startlist.css">
</head>

<body class="startlist-page">

<!-- LOGIN -->
<div id="loginBox">

<h2>Logowanie sędziego</h2>

<input id="login" placeholder="Login">
<input id="password" type="password" placeholder="Hasło">

<button onclick="loginJudge()">Zaloguj</button>

</div>


<header class="site-header">
<div class="header-inner">

<div class="header-title">
Hardstyle Kettlebell European Championship
</div>

<div class="header-links">
<a href="index.html">Wyniki</a>
<a href="#" onclick="window.print()">Drukuj</a>
</div>

</div>
</header>


<div class="page" id="startlistApp" style="display:none">

<div class="panel">

<h1>Listy startowe</h1>

<div class="tabs" id="tabs"></div>

<div class="startlist-actions">

<button onclick="window.print()">Drukuj</button>
<button onclick="exportPDF()">PDF</button>
<label style="margin-left:20px;">
  Stanowiska:
  <input 
  id="stationsInput" 
  type="number" 
  value="8" 
  min="1"
  onchange="showStations()"
  style="width:60px;padding:4px;margin-left:5px"
>
</label>
<label class="filter-box">
<input type="checkbox" id="onlyUnweighted" onchange="filterUnweighted()">
<span>Tylko niezważeni</span>
</label>

<input 
id="searchAthlete"
placeholder="Szukaj zawodnika..."
onkeyup="filterSearch()"
style="margin-left:20px;padding:6px;width:220px"
>

</div>

<div id="content"></div>
</div>
</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

const API_BASE =
"https://script.google.com/macros/s/AKfycbyWhUsE8mxQeGs2LBGN3lWTVvIrqGtvoGX61z61QPilUpOXT6vImh1gg9z1IPQ18kvmhg/exec";

let grouped={};
   let currentCategory = null;
const COMP_MAP = {
  "SNUB3'": { type: "individual" },
  "TGU1RM": { type: "group" },
  "1KBPR1RM": { type: "group" },
  "2KBPR1RM": { type: "group" },
  "2KBSQ1RM": { type: "group" },
  "TIEBREAK": { type: "manual" }
};
/* =======================
   SESJA
======================= */

const TOKEN = sessionStorage.getItem("session_token");

if (TOKEN) {

  document.getElementById("loginBox").style.display="none";
  document.getElementById("startlistApp").style.display="block";

  init();

}else{

  document.getElementById("loginBox").style.display="block";

}


/* =======================
   LOGIN
======================= */

async function loginJudge(){

  const login=document.getElementById("login").value;
  const password=document.getElementById("password").value;

  const res = await fetch(
    API_BASE + `?api=login&login=${login}&password=${password}`
  );

  const data = await res.json();

  if(data.ok){

    sessionStorage.setItem("session_token", data.token);

    location.reload();

  }else{

    alert("Błędny login");

  }

}


/* =======================
   STARTLIST
======================= */

async function init(){

  const TOKEN = sessionStorage.getItem("session_token");

const res = await fetch(
  API_BASE + "?api=startlist&token=" + TOKEN
);

  const data = await res.json();

  grouped = groupByCategory(data);

  renderTabs();

  showFirst();

}


/* =======================
   GROUP
======================= */

function groupByCategory(rows){

  const g={};

  rows.forEach(r=>{

    if(!g[r.kategoria]) g[r.kategoria]=[];

    g[r.kategoria].push(r);

  });

  return g;

}


/* =======================
   TABS
======================= */

function renderTabs(){

  const tabs=document.getElementById("tabs");

  tabs.innerHTML="";

  Object.keys(grouped).forEach(cat=>{

    const btn=document.createElement("button");

    btn.textContent=cat;

    btn.onclick=()=>renderTable(cat);

    tabs.appendChild(btn);

  });
   
const btn = document.createElement("button");
btn.textContent = "Stanowiska";
btn.onclick = showStations;
tabs.appendChild(btn);
}


/* =======================
   FIRST TAB
======================= */

function showFirst(){

  const first=Object.keys(grouped)[0];

  if(first) renderTable(first);

}

  function showStations(){

  if (!currentCategory) {
    alert("Najpierw wybierz kategorię");
    return;
  }

  const category = currentCategory;
  const athletes = grouped[category];

  const stations = parseInt(document.getElementById("stationsInput").value) || 1;

  const comp = "SNUB3'";
  const type = COMP_MAP[comp]?.type;

  let result;

  if (type === "group") {
    result = splitGroup(athletes, stations);
  } else if (type === "individual") {
    result = splitIndividualToStations(athletes, stations);
  } else {
    alert("Manual competition");
    return;
  }

  renderStations(result);
}
function renderStations(data){

  let html = `
<h2 style="color:#ffffff; text-align:center; margin-bottom:20px;">
  Podział na stanowiska
</h2>
`;

  html += '<div style="display:flex;flex-wrap:wrap;gap:20px">';

  data.forEach((group, i) => {

    html += `
<div style="
  background:#12384d;
  padding:15px;
  border-radius:10px;
  min-width:220px;
  color:#ffffff;
">
  <h3 style="margin-bottom:10px;color:#ffffff;">
    Stanowisko ${i+1}
  </h3>

  <ul style="list-style:none;padding:0;margin:0">
`;

    group.forEach(a => {
      html += `<li style="
  padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
  color:#ffffff;
">
        ${a.zawodnik}
      </li>`;
    });

    html += "</ul></div>";
  });

  html += "</div>";

  document.getElementById("content").innerHTML = html;
}
  
/* =======================
   TABLE
======================= */
function renderTable(category){

  currentCategory = category;

  const rows=[...grouped[category]];

  rows.sort((a,b)=>
    (a.zawodnik||"").localeCompare(b.zawodnik||"","pl")
  );

  const container=document.getElementById("content");

  let html=`
<h2 class="category-title">${category}</h2>

<div class="table-wrap">
<table>

  <thead>
  <tr>
  <th>LP</th>
  <th>Zawodnik</th>
  <th>Klub</th>
  <th>Kategoria dodatkowa</th>
  <th>Waga</th>
  </tr>
  </thead>

  <tbody>
  `;

  rows.forEach((r,i)=>{

    html+=`

    <tr class="${r.waga ? 'weighted' : ''}">

    <td>${i+1}</td>

    <td>${r.zawodnik||""}</td>

    <td>${r.klub||""}</td>

    <td>${r.kategoria_dodatkowa||""}</td>

    <td>

      <input
        id="w_${i}"
        type="number"
        value="${r.waga||""}"
        style="width:80px;padding:4px;font-weight:bold;text-align:center"
      >

      <button
        class="save-weight"
        onclick="saveWeight('${r.zawodnik}',${i})"
      >
      Zapisz
      </button>

    </td>

    </tr>

    `;

  });

  html+="</tbody></table></div>";

  container.innerHTML=html;

}

/* =======================
   SAVE WEIGHT
======================= */

async function saveWeight(zawodnik,i){

  const waga = document.getElementById("w_"+i).value;
  const token = sessionStorage.getItem("session_token");

  const btn = event.target;
  const row = btn.closest("tr");

  btn.disabled = true;
  btn.innerText = "Zapisywanie...";

  const res = await fetch(

    API_BASE+
    `?api=saveWeight`+
    `&token=${token}`+
    `&zawodnik=${encodeURIComponent(zawodnik)}`+
    `&waga=${waga}`

  );

  const data = await res.json();

  if(data.ok){

    btn.innerText="✔ Zapisano";
    btn.style.background="#4CAF50";
    btn.style.color="white";

    row.classList.add("weighted");

  }else{

    btn.innerText="Błąd";
    btn.style.background="#f44336";

  }

}


/* =======================
   FILTR NIEZWAŻONYCH
======================= */

function filterUnweighted(){

  const only=document.getElementById("onlyUnweighted").checked;

  document.querySelectorAll("#content tbody tr").forEach(tr=>{

    const input=tr.querySelector("input");

    if(!input) return;

    if(only && input.value){

      tr.style.display="none";

    }else{

      tr.style.display="";

    }

  });

}
function filterSearch(){

  const q = document
    .getElementById("searchAthlete")
    .value
    .toLowerCase();

  document.querySelectorAll("#content tbody tr").forEach(tr=>{

    const name = tr.children[1]?.innerText.toLowerCase() || "";

    if(name.includes(q)){
      tr.style.display="";
    }else{
      tr.style.display="none";
    }

  });

}

/* =======================
   PDF
======================= */

function exportPDF(){

  const element = document.getElementById("content");

  const category =
    document.querySelector("#content h2")?.textContent || "lista-startowa";

  /* ukryj przyciski "Zapisz" */
  const buttons = document.querySelectorAll(".save-weight");
  buttons.forEach(btn => btn.style.display = "none");

  html2pdf()
    .set({

      margin:[5,5,5,5],

      filename:category.replace(/\s+/g,"_")+".pdf",

      pagebreak:{mode:["css","legacy"]},

      html2canvas:{
        scale:2,
        scrollY:0
      },

      jsPDF:{
        unit:"mm",
        format:"a4",
        orientation:"landscape"
      }

    })
    .from(element)
    .save()
    .then(() => {

      /* przywróć przyciski po wygenerowaniu PDF */
      buttons.forEach(btn => btn.style.display = "inline-block");

    });

}
function splitGroup(athletes, stations) {
  const result = Array.from({ length: stations }, () => []);
  let i = 0;

  athletes.forEach(a => {
    result[i].push(a);
    i = (i + 1) % stations;
  });

  return result;
}
  function splitIndividual(athletes, stations) {
  const n = athletes.length;

  if (n <= 16) {
    return splitIntoRounds(athletes, 2);
  }

  let rounds = Math.ceil(n / stations) - 2;
  if (rounds < 1) rounds = 1;

  const used = rounds * stations;
  const remaining = athletes.slice(used);

  const result = [];

  for (let r = 0; r < rounds; r++) {
    result.push(athletes.slice(r * stations, (r + 1) * stations));
  }

  const half = Math.ceil(remaining.length / 2);

  result.push(remaining.slice(0, half));
  result.push(remaining.slice(half));

  return result;
}
   function splitIntoRounds(arr, rounds) {
  const size = Math.ceil(arr.length / rounds);
  const result = [];

  for (let i = 0; i < rounds; i++) {
    result.push(arr.slice(i * size, (i + 1) * size));
  }

  return result;
}
   function splitIndividualToStations(athletes, stations) {

  const n = athletes.length;

  if (stations <= 0) return [];

  // małe przypadki → zwykły podział
  if (n <= 16) {
    return splitGroup(athletes, stations);
  }

  // ile pełnych rund (Twoja zasada)
  let fullRounds = Math.ceil(n / stations) - 2;
  if (fullRounds < 1) fullRounds = 1;

  const basePerStation = fullRounds;

  // ile osób zostaje na 2 ostatnie rundy
  const used = basePerStation * stations;
  let remaining = n - used;

  if (remaining < 0) remaining = 0;

  // rozkład ile osób na każde stanowisko
  const perStation = Array(stations).fill(basePerStation);

  // rozdzielamy resztę (round-robin)
  let i = 0;
  while (remaining > 0) {
    perStation[i]++;
    remaining--;
    i = (i + 1) % stations;
  }

  // przypisanie zawodników
  const result = Array.from({ length: stations }, () => []);

  let index = 0;

  for (let s = 0; s < stations; s++) {
    for (let k = 0; k < perStation[s]; k++) {
      if (athletes[index]) {
        result[s].push(athletes[index]);
        index++;
      }
    }
  }

  return result;
}
</script>

</body>
</html>
